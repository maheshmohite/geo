<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="20" y="20" width="760" height="460" fill="#ffffff" stroke="#0A1F44" stroke-width="2"/>
  <rect x="28" y="28" width="744" height="452" fill="none" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="28" y="432" width="744" height="48" fill="#0A1F44"/>
  <line x1="368" y1="432" x2="368" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="560" y1="432" x2="560" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="44" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">PROJECT</text>
  <text x="44" y="463" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">ROAD NETWORK DRAFTING</text>
  <text x="44" y="474" font-family="Arial, sans-serif" font-size="7.5" fill="#c8d8ea">Geo-Nectar Technologies Pvt. Ltd.</text>
  <text x="374" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DRAWING</text>
  <text x="374" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">ROAD ALIGNMENT PLAN</text>
  <text x="566" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">SCALE</text>
  <text x="566" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1:2000 H / 1:200 V</text>
  <text x="700" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DATE</text>
  <text x="700" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">2024</text>
  <!-- Grid -->
  <g stroke="#c8d8ea" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4">
    <line x1="40" y1="280" x2="760" y2="280"/>
    <line x1="160" y1="40" x2="160" y2="424"/>
    <line x1="320" y1="40" x2="320" y2="424"/>
    <line x1="480" y1="40" x2="480" y2="424"/>
    <line x1="640" y1="40" x2="640" y2="424"/>
  </g>
  <!-- PLAN VIEW (top 55%) -->
  <!-- Topographic background -->
  <rect x="38" y="40" width="722" height="255" fill="#eef3f8"/>
  <text x="52" y="56" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">PLAN VIEW — ROAD ALIGNMENT</text>
  <!-- Road reserve boundary -->
  <line x1="50" y1="130" x2="720" y2="140" stroke="#4a7fc1" stroke-width="1" stroke-dasharray="8,3"/>
  <line x1="50" y1="175" x2="720" y2="185" stroke="#4a7fc1" stroke-width="1" stroke-dasharray="8,3"/>
  <!-- Road pavement (dual carriageway) -->
  <polygon points="50,135 720,145 720,170 50,160" fill="#c8c8c8" stroke="#6b7280" stroke-width="1"/>
  <!-- Central reservation (median) -->
  <polygon points="50,148 720,155 720,162 50,148" fill="#d4e8c8"/>
  <!-- Centerline -->
  <line x1="50" y1="152" x2="720" y2="160" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="15,6"/>
  <!-- Lane markings -->
  <line x1="50" y1="140" x2="720" y2="148" stroke="white" stroke-width="0.8" stroke-dasharray="8,6"/>
  <line x1="50" y1="167" x2="720" y2="175" stroke="white" stroke-width="0.8" stroke-dasharray="8,6"/>
  <!-- Chainage marks -->
  <g stroke="#0A1F44" stroke-width="1">
    <line x1="160" y1="128" x2="160" y2="188"/>
    <line x1="320" y1="128" x2="320" y2="188"/>
    <line x1="480" y1="128" x2="480" y2="188"/>
    <line x1="640" y1="128" x2="640" y2="188"/>
  </g>
  <text x="160" y="123" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle">0+200</text>
  <text x="320" y="123" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle">0+400</text>
  <text x="480" y="123" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle">0+600</text>
  <text x="640" y="123" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle">0+800</text>
  <!-- Road name -->
  <text x="385" y="157" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle">ARTERIAL ROAD — RL 4L DIVIDED — 2 × 3.5m LANES PER CARRIAGEWAY</text>
  <!-- Intersection at 0+500 -->
  <rect x="455" y="75" width="60" height="225" fill="#c8c8c8" stroke="#6b7280" stroke-width="1" opacity="0.7"/>
  <text x="485" y="100" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44" text-anchor="middle" transform="rotate(-90,485,100)">CROSS ST</text>
  <!-- Sight lines from intersection -->
  <line x1="485" y1="75" x2="485" y2="65" stroke="#d97706" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="487" y="62" font-family="Arial, sans-serif" font-size="5.5" fill="#d97706">SSD</text>
  <!-- Embankment hatch (sides of road) -->
  <g stroke="#9ab3d4" stroke-width="0.5" opacity="0.6">
    <line x1="50" y1="130" x2="60" y2="115"/><line x1="80" y1="130" x2="90" y2="115"/>
    <line x1="110" y1="130" x2="120" y2="115"/><line x1="140" y1="130" x2="150" y2="115"/>
    <line x1="50" y1="175" x2="60" y2="190"/><line x1="80" y1="175" x2="90" y2="190"/>
    <line x1="110" y1="175" x2="120" y2="190"/><line x1="140" y1="175" x2="150" y2="190"/>
    <line x1="560" y1="140" x2="570" y2="120"/><line x1="590" y1="140" x2="600" y2="120"/>
    <line x1="560" y1="180" x2="570" y2="200"/><line x1="590" y1="180" x2="600" y2="200"/>
  </g>
  <!-- LONG SECTION (bottom 35%) -->
  <rect x="38" y="285" width="722" height="140" fill="#f8fafc" stroke="#0A1F44" stroke-width="1"/>
  <text x="52" y="298" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#0A1F44">LONGITUDINAL SECTION — VERTICAL SCALE 1:200</text>
  <!-- RL grid (horizontal) -->
  <g stroke="#e5e7eb" stroke-width="0.5">
    <line x1="100" y1="305" x2="755" y2="305"/>
    <line x1="100" y1="325" x2="755" y2="325"/>
    <line x1="100" y1="345" x2="755" y2="345"/>
    <line x1="100" y1="365" x2="755" y2="365"/>
    <line x1="100" y1="385" x2="755" y2="385"/>
    <line x1="100" y1="405" x2="755" y2="405"/>
  </g>
  <text x="90" y="309" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280" text-anchor="end">RL 106</text>
  <text x="90" y="329" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280" text-anchor="end">RL 105</text>
  <text x="90" y="349" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280" text-anchor="end">RL 104</text>
  <text x="90" y="369" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280" text-anchor="end">RL 103</text>
  <text x="90" y="389" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280" text-anchor="end">RL 102</text>
  <!-- Existing ground profile -->
  <path d="M 100,380 C 150,375 200,368 250,365 C 300,362 350,358 400,350 C 450,342 500,338 550,335 C 600,332 650,330 700,328 C 720,327 750,325" fill="#e8eef5" stroke="#9ab3d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Formation level -->
  <path d="M 100,390 C 160,385 220,378 280,372 C 340,366 380,360 430,355 C 475,350 520,346 570,343 C 620,340 670,338 755,335" fill="#dde6f0" stroke="#0A1F44" stroke-width="2"/>
  <!-- Subgrade line -->
  <path d="M 100,398 C 160,393 220,386 280,380 C 340,374 380,368 430,363 C 475,358 520,354 570,351 C 620,348 670,346 755,343" fill="none" stroke="#d97706" stroke-width="1.2" stroke-dasharray="8,4"/>
  <!-- Grade labels -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">-3.2%</text>
  <text x="420" y="348" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">-1.8%</text>
  <text x="620" y="340" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">-1.2%</text>
  <!-- Chainage bottom -->
  <g stroke="#0A1F44" stroke-width="0.5">
    <line x1="100" y1="410" x2="100" y2="415"/><line x1="260" y1="410" x2="260" y2="415"/>
    <line x1="420" y1="410" x2="420" y2="415"/><line x1="580" y1="410" x2="580" y2="415"/>
    <line x1="740" y1="410" x2="740" y2="415"/>
  </g>
  <text x="100" y="424" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">0+000</text>
  <text x="260" y="424" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">0+200</text>
  <text x="420" y="424" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">0+400</text>
  <text x="580" y="424" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">0+600</text>
  <text x="740" y="424" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">0+800</text>
  <!-- Legend -->
  <line x1="42" y1="360" x2="62" y2="360" stroke="#9ab3d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="68" y="364" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4">Exist. Ground</text>
  <line x1="42" y1="374" x2="62" y2="374" stroke="#0A1F44" stroke-width="2"/>
  <text x="68" y="378" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44">Formation</text>
  <line x1="42" y1="388" x2="62" y2="388" stroke="#d97706" stroke-width="1.2" stroke-dasharray="8,4"/>
  <text x="68" y="392" font-family="Arial, sans-serif" font-size="6" fill="#d97706">Subgrade</text>
</svg>

  <text x="50" y="298" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#0A1F44">TABLE A ITEMS</text>
  <text x="50" y="310" font-family="Arial, sans-serif" font-size="5.8" fill="#4b5563">✓ Item 1 – Monuments</text>
  <text x="50" y="321" font-family="Arial, sans-serif" font-size="5.8" fill="#4b5563">✓ Item 2 – Address</text>
  <text x="50" y="332" font-family="Arial, sans-serif" font-size="5.8" fill="#4b5563">✓ Item 6 – Parking</text>
  <text x="50" y="343" font-family="Arial, sans-serif" font-size="5.8" fill="#4b5563">✓ Item 11 – Utilities</text>

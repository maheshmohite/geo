    <line x1="138" y1="65" x2="151" y2="78"/><line x1="151" y1="65" x2="138" y2="78"/>
    <rect x="618" y="51" width="13" height="13"/>
    <line x1="618" y1="51" x2="631" y2="64"/><line x1="631" y1="51" x2="618" y2="64"/>
    <rect x="101" y="398" width="13" height="13"/>
    <line x1="101" y1="398" x2="114" y2="411"/><line x1="114" y1="398" x2="101" y2="411"/>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="20" y="20" width="760" height="460" fill="#ffffff" stroke="#0A1F44" stroke-width="2"/>
  <rect x="28" y="28" width="744" height="452" fill="none" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="28" y="432" width="744" height="48" fill="#0A1F44"/>
  <line x1="368" y1="432" x2="368" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="560" y1="432" x2="560" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="44" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">PROJECT</text>
  <text x="44" y="463" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">CAD TO BIM CONVERSION</text>
  <text x="44" y="474" font-family="Arial, sans-serif" font-size="7.5" fill="#c8d8ea">Geo-Nectar Technologies Pvt. Ltd.</text>
  <text x="374" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">INPUT</text>
  <text x="374" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">AutoCAD DWG</text>
  <text x="566" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">OUTPUT</text>
  <text x="566" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Revit BIM Model</text>
  <text x="700" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DATE</text>
  <text x="700" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">2024</text>
  <!-- Grid lines -->
  <g stroke="#c8d8ea" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4">
    <line x1="120" y1="40" x2="120" y2="424"/>
    <line x1="360" y1="40" x2="360" y2="424"/>
    <line x1="600" y1="40" x2="600" y2="424"/>
    <line x1="40" y1="230" x2="760" y2="230"/>
  </g>
  <!-- LEFT SIDE: 2D CAD Drawing -->
  <rect x="38" y="42" width="330" height="380" fill="#f8fafc" stroke="#6b7280" stroke-width="1"/>
  <rect x="38" y="42" width="330" height="20" fill="#6b7280"/>
  <text x="52" y="57" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" letter-spacing="1">2D CAD DRAWING (DWG)</text>
  <!-- CAD floor plan (2D linework) -->
  <!-- Outer walls -->
  <rect x="60" y="80" width="280" height="200" fill="none" stroke="#0A1F44" stroke-width="2.5"/>
  <!-- Inner walls -->
  <line x1="180" y1="80" x2="180" y2="280" stroke="#0A1F44" stroke-width="1.5"/>
  <line x1="60" y1="175" x2="340" y2="175" stroke="#0A1F44" stroke-width="1.5"/>
  <line x1="280" y1="175" x2="280" y2="80" stroke="#0A1F44" stroke-width="1.5"/>
  <!-- Doors (arc symbols) -->
  <path d="M 180,175 Q 155,150 155,175" fill="none" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="155" y1="175" x2="180" y2="175" stroke="#0A1F44" stroke-width="0.8"/>
  <path d="M 180,280 Q 155,255 155,280" fill="none" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="155" y1="280" x2="180" y2="280" stroke="#0A1F44" stroke-width="0.8"/>
  <path d="M 280,175 Q 305,150 305,175" fill="none" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="280" y1="175" x2="305" y2="175" stroke="#0A1F44" stroke-width="0.8"/>
  <!-- Window symbols -->
  <rect x="100" y="78" width="40" height="4" fill="none" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="100" y1="80" x2="140" y2="80" stroke="#0A1F44" stroke-width="0.4"/>
  <line x1="120" y1="78" x2="120" y2="82" stroke="#0A1F44" stroke-width="0.4"/>
  <rect x="220" y="78" width="40" height="4" fill="none" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="220" y1="80" x2="260" y2="80" stroke="#0A1F44" stroke-width="0.4"/>
  <line x1="240" y1="78" x2="240" y2="82" stroke="#0A1F44" stroke-width="0.4"/>
  <!-- Room labels -->
  <text x="118" y="130" font-family="Arial, sans-serif" font-size="7.5" fill="#6b7280" text-anchor="middle">ROOM 01</text>
  <text x="118" y="143" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">6.0 × 5.0m</text>
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="7.5" fill="#6b7280" text-anchor="middle">ROOM 02</text>
  <text x="310" y="143" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">3.0 × 5.0m</text>
  <text x="118" y="228" font-family="Arial, sans-serif" font-size="7.5" fill="#6b7280" text-anchor="middle">ROOM 03</text>
  <text x="118" y="241" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">6.0 × 5.25m</text>
  <text x="310" y="228" font-family="Arial, sans-serif" font-size="7.5" fill="#6b7280" text-anchor="middle">ROOM 04</text>
  <!-- Dimension lines -->
  <line x1="60" y1="295" x2="340" y2="295" stroke="#0A1F44" stroke-width="0.7"/>
  <line x1="60" y1="290" x2="60" y2="302" stroke="#0A1F44" stroke-width="0.7"/>
  <line x1="340" y1="290" x2="340" y2="302" stroke="#0A1F44" stroke-width="0.7"/>
  <text x="200" y="308" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle" font-weight="bold">14,000</text>
  <line x1="350" y1="80" x2="350" y2="280" stroke="#0A1F44" stroke-width="0.7"/>
  <line x1="345" y1="80" x2="357" y2="80" stroke="#0A1F44" stroke-width="0.7"/>
  <line x1="345" y1="280" x2="357" y2="280" stroke="#0A1F44" stroke-width="0.7"/>
  <text x="360" y="184" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="start" transform="rotate(90,360,184)">10,250</text>
  <!-- CAD file info -->
  <rect x="45" y="315" width="315" height="85" fill="#f0f4f8" stroke="#6b7280" stroke-width="0.8"/>
  <text x="55" y="329" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#6b7280">CAD FILE DETAILS</text>
  <text x="55" y="342" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">Format: AutoCAD .dwg (2018)</text>
  <text x="55" y="355" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">Layers: 48 (walls, doors, windows, dims)</text>
  <text x="55" y="368" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">Scale: 1:100</text>
  <text x="55" y="381" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">Sheets: 12 (Plans, Elevations, Sections)</text>
  <text x="55" y="394" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">Status: 2D only — no parametric data</text>
  <!-- CENTER ARROW -->
  <polygon points="378,210 408,195 408,205 422,205 422,195 452,210 422,225 422,215 408,215 408,225" fill="#d97706"/>
  <text x="415" y="245" font-family="Arial, sans-serif" font-size="7" fill="#d97706" text-anchor="middle" font-weight="bold">CONVERT</text>
  <!-- RIGHT SIDE: BIM Model -->
  <rect x="462" y="42" width="300" height="380" fill="#eef3f8" stroke="#0A1F44" stroke-width="1"/>
  <rect x="462" y="42" width="300" height="20" fill="#0A1F44"/>
  <text x="476" y="57" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" letter-spacing="1">REVIT BIM MODEL</text>
  <!-- 3D isometric building view -->
  <!-- Bottom face -->
  <polygon points="500,370 640,370 720,320 580,320" fill="#dde6f0" stroke="#0A1F44" stroke-width="1"/>
  <!-- Front face -->
  <polygon points="500,370 580,320 580,210 500,260" fill="#c5d5e8" stroke="#0A1F44" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="580,320 720,320 720,210 580,210" fill="#dde8f5" stroke="#0A1F44" stroke-width="1"/>
  <!-- Top face -->
  <polygon points="500,260 580,210 720,210 640,260" fill="#4a7fc1" stroke="#0A1F44" stroke-width="1.2" opacity="0.8"/>
  <!-- Windows front -->
  <rect x="510" y="275" width="20" height="28" fill="#a8c5e0" stroke="#0A1F44" stroke-width="0.8"/>
  <rect x="540" y="275" width="20" height="28" fill="#a8c5e0" stroke="#0A1F44" stroke-width="0.8"/>
  <!-- Windows right -->
  <rect x="598" y="253" width="25" height="30" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="635" y="248" width="25" height="30" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="675" y="243" width="25" height="30" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- BIM model info box -->
  <rect x="468" y="315" width="285" height="98" fill="#f8fafc" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="478" y="329" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#0A1F44">BIM MODEL DELIVERABLES</text>
  <text x="478" y="342" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ Revit .rvt model (LOD 300)</text>
  <text x="478" y="355" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ IFC export for OpenBIM workflows</text>
  <text x="478" y="368" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ Parametric walls, doors &amp; windows</text>
  <text x="478" y="381" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ Room data schedules &amp; areas</text>
  <text x="478" y="394" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ Material properties assigned</text>
  <text x="478" y="407" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">✓ Shared coordinates set</text>
</svg>

  <text x="400" y="294" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle">Every hour your PE spends on drafting is an hour not spent on high-value engineering, client relationships, or winning new work</text>
  <!-- 4 opportunity cost boxes -->

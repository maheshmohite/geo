  <g font-family="Arial, sans-serif" font-size="6">
    <text x="525" y="142" fill="#6b7280">ALTA Surveying</text>
    <rect x="635" y="134" width="120" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="635" y="134" width="30" height="8" fill="#ef4444" rx="1"/>
    <text x="758" y="141" fill="#ef4444">25%</text>

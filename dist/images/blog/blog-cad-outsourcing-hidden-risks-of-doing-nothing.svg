  <text x="640" y="232" font-family="Arial, sans-serif" font-size="7" fill="#22a366" text-anchor="middle">GeoNectar: 100% capability in all disciplines</text>
  <text x="640" y="244" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">50+ specialists across all AEC verticals</text>

    <rect x="635" y="148" width="120" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="635" y="148" width="18" height="8" fill="#ef4444" rx="1"/>
    <text x="758" y="155" fill="#ef4444">15%</text>
    <text x="525" y="170" fill="#6b7280">Structural Steel</text>
    <rect x="635" y="162" width="120" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="635" y="162" width="36" height="8" fill="#d97706" rx="1"/>
    <text x="758" y="169" fill="#d97706">30%</text>
    <text x="525" y="184" fill="#6b7280">GIS / ESRI</text>
    <rect x="635" y="176" width="120" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="635" y="176" width="12" height="8" fill="#ef4444" rx="1"/>
    <text x="758" y="183" fill="#ef4444">10%</text>
    <text x="525" y="198" fill="#6b7280">Point Cloud BIM</text>
    <rect x="635" y="190" width="120" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="635" y="190" width="24" height="8" fill="#ef4444" rx="1"/>
    <text x="758" y="197" fill="#ef4444">20%</text>

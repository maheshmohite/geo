  <text x="274" y="473" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">CAD Outsourcing Risks: What You Lose by Not Acting</text>
  <text x="534" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">PUBLISHED</text>
  <text x="534" y="473" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">May 15, 2021</text>
  <text x="534" y="483" font-family="Arial, sans-serif" font-size="6" fill="#F05A28">GeoNectar Technologies</text>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">CAD OUTSOURCING RISK INFOGRAPHIC  |  HIDDEN COSTS · CAPACITY · OPPORTUNITY COST</text>
  <!-- Warning banner -->
  <rect x="28" y="50" width="744" height="30" fill="#ef4444" rx="2"/>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">⚠  WHAT YOUR FIRM LOSES EVERY DAY BY NOT OUTSOURCING CAD DRAFTING</text>
  <text x="400" y="76" font-family="Arial, sans-serif" font-size="6.5" fill="#fecaca" text-anchor="middle">The true cost is not in the outsourcing — it is in the in-house bottleneck</text>
  <!-- Risk 1: Fixed Costs -->
  <rect x="28" y="90" width="228" height="162" fill="#fff5f5" stroke="#ef4444" stroke-width="1" rx="3"/>
  <rect x="28" y="90" width="228" height="20" fill="#ef4444" rx="3"/>
  <rect x="28" y="100" width="228" height="10" fill="#ef4444"/>

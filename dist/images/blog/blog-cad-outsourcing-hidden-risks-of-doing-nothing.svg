  <text x="382" y="176" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">team capacity</text>
  <g font-family="Arial, sans-serif" font-size="6">
    <rect x="278" y="216" width="8" height="8" fill="#22a366" rx="1"/>
    <text x="290" y="223" fill="#6b7280">0–80%: Healthy</text>
    <rect x="278" y="228" width="8" height="8" fill="#d97706" rx="1"/>
    <text x="290" y="235" fill="#6b7280">80–100%: Strained</text>
    <rect x="352" y="216" width="8" height="8" fill="#ef4444" rx="1"/>
    <text x="364" y="223" fill="#6b7280">100%+: Crisis</text>
    <text x="382" y="242" fill="#ef4444" text-anchor="middle" font-weight="bold">Missed deadlines = lost contracts</text>
  </g>
  <!-- Risk 3: Limited Skills -->
  <rect x="508" y="90" width="264" height="162" fill="#fdf8ff" stroke="#7c3aed" stroke-width="1" rx="3"/>
  <rect x="508" y="90" width="264" height="20" fill="#7c3aed" rx="3"/>
  <rect x="508" y="100" width="264" height="10" fill="#7c3aed"/>
  <text x="640" y="106" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff" text-anchor="middle">LIMITED SKILL ACCESS</text>
  <text x="525" y="126" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">IN-HOUSE (3-person team) CAN COVER:</text>

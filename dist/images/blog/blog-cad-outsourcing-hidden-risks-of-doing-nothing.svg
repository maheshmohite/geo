  <text x="125" y="320" font-family="Arial, sans-serif" font-size="7" fill="#4a7fc1" text-anchor="middle" font-weight="bold">PROJECTS NOT BID</text>
  <text x="125" y="336" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">40%</text>
  <text x="125" y="350" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">of RFPs declined due to</text>
  <text x="125" y="362" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">bandwidth constraints</text>
  <text x="125" y="376" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">= Revenue never captured</text>
  <rect x="218" y="304" width="162" height="80" fill="#1a2f5a" stroke="#d97706" stroke-width="0.8" rx="2"/>
  <text x="299" y="320" font-family="Arial, sans-serif" font-size="7" fill="#d97706" text-anchor="middle" font-weight="bold">ERRORS &amp; REWORK</text>
  <text x="299" y="336" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#d97706" text-anchor="middle">8–12%</text>
  <text x="299" y="350" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">rework rate on stretched</text>
  <text x="299" y="362" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">in-house teams</text>
  <text x="299" y="376" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">GeoNectar: &lt;1%</text>
  <rect x="392" y="304" width="162" height="80" fill="#1a2f5a" stroke="#7c3aed" stroke-width="0.8" rx="2"/>
  <text x="473" y="320" font-family="Arial, sans-serif" font-size="7" fill="#7c3aed" text-anchor="middle" font-weight="bold">GROWTH STALLED</text>
  <text x="473" y="336" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7c3aed" text-anchor="middle">2×</text>
  <text x="473" y="350" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">outsourcing firms grow</text>
  <text x="473" y="362" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">faster than in-house-only</text>
  <text x="473" y="376" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">Industry benchmark 2023</text>
  <rect x="566" y="304" width="190" height="80" fill="#1a2f5a" stroke="#F05A28" stroke-width="0.8" rx="2"/>
  <text x="661" y="320" font-family="Arial, sans-serif" font-size="7" fill="#F05A28" text-anchor="middle" font-weight="bold">COMPETITIVE EROSION</text>
  <text x="661" y="340" font-family="Arial, sans-serif" font-size="8" fill="#c8d8ea" text-anchor="middle">Rivals who outsource</text>
  <text x="661" y="352" font-family="Arial, sans-serif" font-size="8" fill="#c8d8ea" text-anchor="middle">submit more bids,</text>
  <text x="661" y="364" font-family="Arial, sans-serif" font-size="8" fill="#c8d8ea" text-anchor="middle">win more contracts,</text>
  <text x="661" y="376" font-family="Arial, sans-serif" font-size="8" fill="#F05A28" text-anchor="middle">and grow market share.</text>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#F05A28" text-anchor="middle">The cost of inaction compounds every quarter. Act now — services@geo-nectar.com</text>

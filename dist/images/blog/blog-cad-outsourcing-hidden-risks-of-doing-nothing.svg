  <circle cx="382" cy="168" r="55" fill="none" stroke="#d97706" stroke-width="12" stroke-dasharray="52 345" stroke-dashoffset="-104"/>
  <circle cx="382" cy="168" r="55" fill="none" stroke="#ef4444" stroke-width="12" stroke-dasharray="17 345" stroke-dashoffset="-156"/>

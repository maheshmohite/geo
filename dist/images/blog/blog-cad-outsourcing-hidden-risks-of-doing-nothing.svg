  <!-- Cost breakdown -->
  <g font-family="Arial, sans-serif" font-size="6">
    <text x="44" y="125" fill="#0A1F44">ANNUAL IN-HOUSE DRAFTER COST:</text>
    <rect x="44" y="130" width="110" height="10" fill="#ef4444" opacity="0.7" rx="1"/>
    <text x="158" y="139" fill="#ef4444">$65k  Salary</text>
    <rect x="44" y="144" width="55" height="10" fill="#d97706" opacity="0.7" rx="1"/>
    <text x="103" y="153" fill="#d97706">$22k  Benefits</text>
    <rect x="44" y="158" width="42" height="10" fill="#7c3aed" opacity="0.7" rx="1"/>
    <text x="90" y="167" fill="#7c3aed">$15k  Software</text>
    <rect x="44" y="172" width="24" height="10" fill="#3b82f6" opacity="0.7" rx="1"/>
    <text x="72" y="181" fill="#3b82f6">$8k  Training</text>
    <rect x="44" y="186" width="18" height="10" fill="#22a366" opacity="0.7" rx="1"/>
    <text x="66" y="195" fill="#22a366">$6k  Space</text>
    <line x1="44" y1="200" x2="200" y2="200" stroke="#ef4444" stroke-width="0.8"/>
    <text x="44" y="212" font-size="7" font-weight="bold" fill="#ef4444">TOTAL: ~$116k/yr per drafter</text>
    <text x="44" y="225" fill="#22a366">GeoNectar: ~$45k/yr equivalent</text>
    <text x="44" y="237" font-weight="bold" fill="#22a366">SAVING: $71k per drafter/year</text>

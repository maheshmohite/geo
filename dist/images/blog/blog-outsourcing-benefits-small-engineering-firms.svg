<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="14" y="14" width="772" height="472" fill="#ffffff" stroke="#0A1F44" stroke-width="1.5"/>
  <rect x="14" y="451" width="772" height="35" fill="#0A1F44"/>
  <line x1="260" y1="451" x2="260" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="520" y1="451" x2="520" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="28" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">CATEGORY</text>
  <text x="28" y="473" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">OUTSOURCING TIPS</text>
  <text x="28" y="483" font-family="Arial, sans-serif" font-size="6.5" fill="#c8d8ea">geo-nectar.com</text>
  <text x="274" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">TOPIC</text>
  <text x="274" y="473" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Outsourcing Benefits for Small Engineering Firms</text>
  <text x="534" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">PUBLISHED</text>
  <text x="534" y="473" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">January 15, 2021</text>
  <text x="534" y="483" font-family="Arial, sans-serif" font-size="6" fill="#F05A28">GeoNectar Technologies</text>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">SME OUTSOURCING INFOGRAPHIC  |  COST · FLEXIBILITY · EXPERTISE · 24/7 AVAILABILITY</text>
  <!-- Title banner -->
  <rect x="28" y="50" width="744" height="36" fill="#0A1F44" rx="2"/>
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">WHY SMALL ENGINEERING FIRMS OUTSOURCE CAD DRAFTING TO GEO-NECTAR</text>
  <text x="400" y="78" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" text-anchor="middle">5 Key Benefits That Change How Small Firms Compete</text>
  <!-- Benefit 1: Cost -->
  <rect x="28" y="96" width="222" height="170" fill="#fff8f0" stroke="#F05A28" stroke-width="1" rx="3"/>
  <rect x="28" y="96" width="222" height="28" fill="#F05A28" rx="3"/>
  <rect x="28" y="110" width="222" height="14" fill="#F05A28"/>
  <text x="139" y="115" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">01  ELIMINATE FIXED COSTS</text>
  <text x="139" y="148" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F05A28" text-anchor="middle">$108k</text>
  <text x="139" y="162" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">saved per drafter/year</text>
  <rect x="44" y="172" width="192" height="6" fill="#e0e8f0" rx="2"/>
  <rect x="44" y="172" width="77" height="6" fill="#22a366" rx="2"/>
  <text x="139" y="190" font-family="Arial, sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">No salary · No benefits · No software licences</text>
  <text x="139" y="202" font-family="Arial, sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">No workstation · No training cost</text>
  <text x="139" y="218" font-family="Arial, sans-serif" font-size="7.5" fill="#F05A28" text-anchor="middle">Pay only for what you use</text>
  <text x="139" y="230" font-family="Arial, sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">Per-drawing or retainer models available</text>
  <text x="139" y="244" font-family="Arial, sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">Fixed overhead → Variable, project-tied cost</text>
  <text x="139" y="258" font-family="Arial, sans-serif" font-size="6.5" fill="#22a366" text-anchor="middle">Free capital for marketing &amp; R&amp;D</text>
  <!-- Benefit 2: Expertise -->
  <rect x="262" y="96" width="222" height="170" fill="#f0f8ff" stroke="#4a7fc1" stroke-width="1" rx="3"/>
  <rect x="262" y="96" width="222" height="28" fill="#4a7fc1" rx="3"/>
  <rect x="262" y="110" width="222" height="14" fill="#4a7fc1"/>
  <text x="373" y="115" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">02  ACCESS SPECIALIST SKILLS</text>
  <!-- Skill tags -->
  <g font-family="Arial, sans-serif" font-size="6.5">
    <rect x="274" y="130" width="70" height="14" fill="#4a7fc1" rx="2" opacity="0.8"/>
    <text x="309" y="140" fill="#ffffff" text-anchor="middle">ALTA Survey</text>
    <rect x="352" y="130" width="55" height="14" fill="#4a7fc1" rx="2" opacity="0.8"/>
    <text x="379" y="140" fill="#ffffff" text-anchor="middle">BIM LOD500</text>
    <rect x="415" y="130" width="58" height="14" fill="#4a7fc1" rx="2" opacity="0.8"/>
    <text x="444" y="140" fill="#ffffff" text-anchor="middle">Navisworks</text>
    <rect x="274" y="148" width="58" height="14" fill="#0A1F44" rx="2"/>
    <text x="303" y="158" fill="#ffffff" text-anchor="middle">Civil 3D</text>
    <rect x="338" y="148" width="48" height="14" fill="#0A1F44" rx="2"/>
    <text x="362" y="158" fill="#ffffff" text-anchor="middle">GIS / ESRI</text>
    <rect x="392" y="148" width="72" height="14" fill="#0A1F44" rx="2"/>
    <text x="428" y="158" fill="#ffffff" text-anchor="middle">Point Cloud BIM</text>
    <rect x="274" y="166" width="60" height="14" fill="#22a366" rx="2"/>
    <text x="304" y="176" fill="#ffffff" text-anchor="middle">Tekla Steel</text>
    <rect x="340" y="166" width="55" height="14" fill="#22a366" rx="2"/>
    <text x="367" y="176" fill="#ffffff" text-anchor="middle">HVAC Duct</text>
    <rect x="401" y="166" width="68" height="14" fill="#22a366" rx="2"/>
    <text x="435" y="176" fill="#ffffff" text-anchor="middle">Photogrammetry</text>
  </g>
  <text x="373" y="200" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44" text-anchor="middle">50+ certified CAD specialists</text>
  <text x="373" y="212" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">Capabilities a 3-person firm cannot match in-house</text>
  <text x="373" y="228" font-family="Arial, sans-serif" font-size="7" fill="#4a7fc1" text-anchor="middle">Tap into enterprise-level expertise</text>
  <text x="373" y="244" font-family="Arial, sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">without enterprise-level payroll</text>
  <text x="373" y="258" font-family="Arial, sans-serif" font-size="6.5" fill="#22a366" text-anchor="middle">ISO 9001:2015 certified processes</text>
  <!-- Benefit 3: 24/7 -->
  <rect x="496" y="96" width="276" height="170" fill="#e8f8f0" stroke="#22a366" stroke-width="1" rx="3"/>
  <rect x="496" y="96" width="276" height="28" fill="#22a366" rx="3"/>
  <rect x="496" y="110" width="276" height="14" fill="#22a366"/>
  <text x="634" y="115" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">03  24/7 SERVICE AVAILABILITY</text>
  <!-- Clock face -->
  <circle cx="570" cy="186" r="44" fill="#ffffff" stroke="#22a366" stroke-width="2"/>
  <circle cx="570" cy="186" r="3" fill="#0A1F44"/>
  <!-- Clock hands -->
  <line x1="570" y1="186" x2="570" y2="152" stroke="#0A1F44" stroke-width="2"/>
  <line x1="570" y1="186" x2="600" y2="196" stroke="#F05A28" stroke-width="2"/>
  <!-- Hour marks -->
  <g stroke="#9ab3d4" stroke-width="1">
    <line x1="570" y1="145" x2="570" y2="150"/>
    <line x1="570" y1="222" x2="570" y2="227"/>
    <line x1="527" y1="186" x2="532" y2="186"/>
    <line x1="608" y1="186" x2="613" y2="186"/>
  </g>
  <text x="570" y="175" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">12</text>
  <text x="570" y="233" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">6</text>
  <text x="521" y="190" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">9</text>
  <text x="617" y="190" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">3</text>
  <g font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">
    <text x="630" y="138">✓  Handle urgent client requests</text>
    <text x="630" y="152">✓  Meet tight bid deadlines</text>
    <text x="630" y="166">✓  Overnight delivery model</text>
    <text x="630" y="180">✓  No weekend delays</text>
    <text x="630" y="194">✓  Holiday coverage available</text>
    <text x="630" y="208">✓  US · UK · AUS time zones</text>
    <text x="630" y="222">✓  Dedicated project manager</text>
    <text x="630" y="236">✓  Real-time project updates</text>
  </g>
  <text x="634" y="258" font-family="Arial, sans-serif" font-size="7" fill="#22a366" text-anchor="middle">Never miss a deadline again</text>
  <!-- Row 2: Benefits 4 & 5 -->
  <!-- Benefit 4: Flexibility -->
  <rect x="28" y="278" width="358" height="162" fill="#fdf8ff" stroke="#7c3aed" stroke-width="1" rx="3"/>
  <rect x="28" y="278" width="358" height="22" fill="#7c3aed" rx="3"/>
  <rect x="28" y="288" width="358" height="12" fill="#7c3aed"/>
  <text x="207" y="296" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">04  EMPLOYMENT FLEXIBILITY</text>
  <!-- Ramp chart -->
  <g font-family="Arial, sans-serif" font-size="6">
    <text x="50" y="318" fill="#6b7280">TEAM SIZE</text>
    <line x1="50" y1="320" x2="50" y2="400" stroke="#0A1F44" stroke-width="0.8"/>
    <line x1="50" y1="400" x2="370" y2="400" stroke="#0A1F44" stroke-width="0.8"/>
    <text x="44" y="330" fill="#6b7280" text-anchor="end">15</text>
    <text x="44" y="350" fill="#6b7280" text-anchor="end">10</text>
    <text x="44" y="370" fill="#6b7280" text-anchor="end">5</text>
    <text x="44" y="390" fill="#6b7280" text-anchor="end">1</text>
    <line x1="50" y1="330" x2="370" y2="330" stroke="#e0e8f0" stroke-width="0.5"/>
    <line x1="50" y1="350" x2="370" y2="350" stroke="#e0e8f0" stroke-width="0.5"/>
    <line x1="50" y1="370" x2="370" y2="370" stroke="#e0e8f0" stroke-width="0.5"/>
    <line x1="50" y1="390" x2="370" y2="390" stroke="#e0e8f0" stroke-width="0.5"/>
    <!-- Demand curve -->
    <polyline points="50,385 100,370 140,345 180,328 220,335 260,360 300,340 340,332 370,338" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
    <!-- In-house flat line -->
    <line x1="50" y1="355" x2="370" y2="355" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="375" y="358" fill="#ef4444" font-size="5.5">Fixed</text>
    <text x="375" y="338" fill="#7c3aed" font-size="5.5">GeoNectar</text>
    <text x="80" y="412" fill="#6b7280">Q1</text>
    <text x="180" y="412" fill="#6b7280">Q2</text>
    <text x="260" y="412" fill="#6b7280">Q3</text>
    <text x="340" y="412" fill="#6b7280">Q4</text>
    <text x="207" y="428" fill="#7c3aed" text-anchor="middle">Scale with project demand — no hiring cycles, no redundancies</text>
  </g>
  <!-- Benefit 5: Security -->
  <rect x="398" y="278" width="374" height="162" fill="#f0f4ff" stroke="#3b82f6" stroke-width="1" rx="3"/>
  <rect x="398" y="278" width="374" height="22" fill="#3b82f6" rx="3"/>
  <rect x="398" y="288" width="374" height="12" fill="#3b82f6"/>
  <text x="585" y="296" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">05  DATA PROTECTION &amp; IP SECURITY</text>
  <g font-family="Arial, sans-serif" font-size="6.5">
    <rect x="414" y="308" width="164" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="496" y="322" fill="#0A1F44" text-anchor="middle" font-weight="bold">NDA &amp; Confidentiality</text>
    <text x="496" y="334" fill="#6b7280" text-anchor="middle">Signed before project start</text>
    <text x="496" y="344" fill="#6b7280" text-anchor="middle">Legally binding agreements</text>
    <rect x="586" y="308" width="170" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="671" y="322" fill="#0A1F44" text-anchor="middle" font-weight="bold">Secure File Transfer</text>
    <text x="671" y="334" fill="#6b7280" text-anchor="middle">Encrypted VPN channels</text>
    <text x="671" y="344" fill="#6b7280" text-anchor="middle">No third-party cloud sharing</text>
    <rect x="414" y="350" width="164" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="496" y="364" fill="#0A1F44" text-anchor="middle" font-weight="bold">Access Control</text>
    <text x="496" y="376" fill="#6b7280" text-anchor="middle">Role-based permissions</text>
    <text x="496" y="386" fill="#6b7280" text-anchor="middle">Audit trails on all files</text>
    <rect x="586" y="350" width="170" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="671" y="364" fill="#0A1F44" text-anchor="middle" font-weight="bold">ISO 9001:2015</text>
    <text x="671" y="376" fill="#6b7280" text-anchor="middle">Certified quality management</text>
    <text x="671" y="386" fill="#6b7280" text-anchor="middle">Documented risk protocols</text>
    <text x="585" y="424" fill="#3b82f6" text-anchor="middle" font-size="7">Your IP is protected at every stage — contractually and technically</text>
  </g>
</svg>

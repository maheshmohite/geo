<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="20" y="20" width="760" height="460" fill="#ffffff" stroke="#0A1F44" stroke-width="2"/>
  <rect x="28" y="28" width="744" height="452" fill="none" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="28" y="432" width="744" height="48" fill="#0A1F44"/>
  <line x1="368" y1="432" x2="368" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="560" y1="432" x2="560" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="44" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">PROJECT</text>
  <text x="44" y="463" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">MEP DRAFTING SERVICES</text>
  <text x="44" y="474" font-family="Arial, sans-serif" font-size="7.5" fill="#c8d8ea">Geo-Nectar Technologies Pvt. Ltd.</text>
  <text x="374" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DRAWING</text>
  <text x="374" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">COORDINATED MEP PLAN</text>
  <text x="566" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">SCALE</text>
  <text x="566" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1:100</text>
  <text x="650" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DATE</text>
  <text x="650" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">2024</text>
  <!-- Grid -->
  <g stroke="#c8d8ea" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4">
    <line x1="200" y1="40" x2="200" y2="424"/>
    <line x1="400" y1="40" x2="400" y2="424"/>
    <line x1="600" y1="40" x2="600" y2="424"/>
    <line x1="40" y1="170" x2="760" y2="170"/>
    <line x1="40" y1="300" x2="760" y2="300"/>
  </g>
  <!-- Floor plan boundary -->
  <rect x="42" y="42" width="590" height="380" fill="#f0f8ff" stroke="#0A1F44" stroke-width="1.5"/>
  <text x="55" y="56" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">COORDINATED MEP PLAN — CEILING SPACE  |  EL. +2800 TO +3200</text>
  <!-- Structural elements (light) -->
  <line x1="200" y1="42" x2="200" y2="422" stroke="#9ab3d4" stroke-width="3" opacity="0.3"/>
  <line x1="400" y1="42" x2="400" y2="422" stroke="#9ab3d4" stroke-width="3" opacity="0.3"/>
  <line x1="42" y1="170" x2="632" y2="170" stroke="#9ab3d4" stroke-width="3" opacity="0.3"/>
  <line x1="42" y1="300" x2="632" y2="300" stroke="#9ab3d4" stroke-width="3" opacity="0.3"/>
  <!-- HVAC DUCTWORK (blue — large rectangles) -->
  <!-- Main supply duct -->
  <rect x="55" y="75" width="565" height="34" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1.8" rx="1"/>
  <text x="337" y="96" font-family="Arial, sans-serif" font-size="7.5" fill="#0A1F44" text-anchor="middle" font-weight="bold">800×400 SA DUCT</text>
  <!-- Branch ducts -->
  <rect x="180" y="109" width="24" height="115" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1.5"/>
  <rect x="380" y="109" width="24" height="115" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1.5"/>
  <rect x="560" y="109" width="24" height="115" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1.5"/>
  <!-- Return air duct -->
  <rect x="55" y="300" width="565" height="28" fill="#e0f0e8" stroke="#22a366" stroke-width="1.5" rx="1"/>
  <text x="337" y="318" font-family="Arial, sans-serif" font-size="7" fill="#22a366" text-anchor="middle">600×250 RA DUCT</text>
  <!-- PLUMBING PIPES (below HVAC — different elevation) -->
  <!-- Cold water -->
  <line x1="55" y1="145" x2="632" y2="145" stroke="#2563eb" stroke-width="4"/>
  <text x="160" y="141" font-family="Arial, sans-serif" font-size="6" fill="#2563eb">CWS DN50</text>
  <!-- Hot water -->
  <line x1="55" y1="155" x2="500" y2="155" stroke="#d97706" stroke-width="3"/>
  <text x="160" y="152" font-family="Arial, sans-serif" font-size="6" fill="#d97706">HWS DN32</text>
  <!-- Sanitary -->
  <line x1="55" y1="167" x2="632" y2="167" stroke="#7c3a00" stroke-width="5"/>
  <text x="160" y="164" font-family="Arial, sans-serif" font-size="6" fill="#7c3a00">SAN DN100</text>
  <!-- Vertical plumbing drops -->
  <line x1="120" y1="109" x2="120" y2="295" stroke="#2563eb" stroke-width="3"/>
  <line x1="300" y1="109" x2="300" y2="295" stroke="#2563eb" stroke-width="3"/>
  <line x1="500" y1="109" x2="500" y2="295" stroke="#7c3a00" stroke-width="4"/>
  <!-- ELECTRICAL CABLE TRAY -->
  <rect x="55" y="340" width="560" height="18" fill="none" stroke="#d97706" stroke-width="1.8" stroke-dasharray="10,4"/>
  <text x="337" y="353" font-family="Arial, sans-serif" font-size="7" fill="#d97706" text-anchor="middle">600W CABLE TRAY — HV + LV + DATA</text>
  <!-- Fire protection sprinkler mains -->
  <line x1="55" y1="252" x2="632" y2="252" stroke="#ef4444" stroke-width="3"/>
  <text x="337" y="248" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle">SP MAIN DN100</text>
  <!-- Sprinkler heads -->
  <g stroke="#ef4444" fill="none" stroke-width="1">
    <circle cx="130" cy="265" r="4"/><line x1="130" y1="252" x2="130" y2="261"/>
    <circle cx="230" cy="265" r="4"/><line x1="230" y1="252" x2="230" y2="261"/>
    <circle cx="330" cy="265" r="4"/><line x1="330" y1="252" x2="330" y2="261"/>
    <circle cx="430" cy="265" r="4"/><line x1="430" y1="252" x2="430" y2="261"/>
    <circle cx="530" cy="265" r="4"/><line x1="530" y1="252" x2="530" y2="261"/>
  </g>
  <!-- Elevation labels (right side) -->
  <rect x="640" y="42" width="118" height="380" fill="#f8fafc" stroke="#0A1F44" stroke-width="1"/>
  <rect x="640" y="42" width="118" height="16" fill="#0A1F44"/>
  <text x="699" y="54" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">SERVICES ELEVATION</text>
  <!-- Elevation scale -->
  <line x1="660" y1="65" x2="660" y2="420" stroke="#0A1F44" stroke-width="1"/>
  <line x1="657" y1="65" x2="665" y2="65" stroke="#0A1F44" stroke-width="1"/>
  <text x="670" y="69" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">+3200 (slab soffit)</text>
  <!-- duct band -->
  <rect x="680" y="72" width="30" height="14" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1"/>
  <text x="695" y="82" font-family="Arial, sans-serif" font-size="5.5" fill="#4a7fc1" text-anchor="middle">SA DUCT</text>
  <line x1="657" y1="95" x2="665" y2="95" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="670" y="99" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">+3100</text>
  <!-- pipe bands -->
  <line x1="680" y1="104" x2="710" y2="104" stroke="#2563eb" stroke-width="3"/>
  <text x="720" y="108" font-family="Arial, sans-serif" font-size="5.5" fill="#2563eb">CWS</text>
  <line x1="680" y1="114" x2="710" y2="114" stroke="#d97706" stroke-width="3"/>
  <text x="720" y="118" font-family="Arial, sans-serif" font-size="5.5" fill="#d97706">HWS</text>
  <line x1="680" y1="124" x2="710" y2="124" stroke="#7c3a00" stroke-width="4"/>
  <text x="720" y="128" font-family="Arial, sans-serif" font-size="5.5" fill="#7c3a00">SAN</text>
  <line x1="657" y1="135" x2="665" y2="135" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="670" y="139" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">+2900</text>
  <line x1="680" y1="144" x2="710" y2="144" stroke="#ef4444" stroke-width="3"/>
  <text x="720" y="148" font-family="Arial, sans-serif" font-size="5.5" fill="#ef4444">FP Main</text>
  <rect x="680" y="153" width="30" height="10" fill="none" stroke="#d97706" stroke-width="1.2" stroke-dasharray="5,2"/>
  <text x="720" y="162" font-family="Arial, sans-serif" font-size="5.5" fill="#d97706">C/Tray</text>
  <rect x="680" y="168" width="30" height="10" fill="#e0f0e8" stroke="#22a366" stroke-width="1.2"/>
  <text x="720" y="177" font-family="Arial, sans-serif" font-size="5.5" fill="#22a366">RA Duct</text>
  <line x1="657" y1="185" x2="665" y2="185" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="670" y="189" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">+2800 (FFL)</text>
  <!-- Legend -->
  <text x="645" y="210" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#0A1F44">DISCIPLINE KEY</text>
  <rect x="645" y="216" width="10" height="10" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1"/>
  <text x="660" y="225" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Mech/HVAC</text>
  <line x1="645" y1="234" x2="655" y2="234" stroke="#2563eb" stroke-width="3"/>
  <text x="660" y="238" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Plumbing (CWS)</text>
  <line x1="645" y1="248" x2="655" y2="248" stroke="#7c3a00" stroke-width="4"/>
  <text x="660" y="252" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Sanitary</text>
  <rect x="645" y="260" width="12" height="8" fill="none" stroke="#d97706" stroke-width="1.2" stroke-dasharray="5,2"/>
  <text x="660" y="268" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Electrical Tray</text>
  <line x1="645" y1="278" x2="655" y2="278" stroke="#ef4444" stroke-width="3"/>
  <text x="660" y="282" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Fire Protection</text>
</svg>

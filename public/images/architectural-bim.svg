<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="20" y="20" width="760" height="460" fill="#ffffff" stroke="#0A1F44" stroke-width="2"/>
  <rect x="28" y="28" width="744" height="452" fill="none" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="28" y="432" width="744" height="48" fill="#0A1F44"/>
  <line x1="368" y1="432" x2="368" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="560" y1="432" x2="560" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="44" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">PROJECT</text>
  <text x="44" y="463" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">ARCHITECTURAL BIM MODELING</text>
  <text x="44" y="474" font-family="Arial, sans-serif" font-size="7.5" fill="#c8d8ea">Geo-Nectar Technologies Pvt. Ltd.</text>
  <text x="374" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">SOFTWARE</text>
  <text x="374" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Revit 2024</text>
  <text x="566" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">LOD</text>
  <text x="566" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">300 — 400</text>
  <text x="650" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DATE</text>
  <text x="650" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">2024</text>
  <!-- Light grid -->
  <g stroke="#c8d8ea" stroke-width="0.4" stroke-dasharray="4,4" opacity="0.4">
    <line x1="120" y1="40" x2="120" y2="424"/>
    <line x1="240" y1="40" x2="240" y2="424"/>
    <line x1="360" y1="40" x2="360" y2="424"/>
    <line x1="480" y1="40" x2="480" y2="424"/>
    <line x1="600" y1="40" x2="600" y2="424"/>
    <line x1="40" y1="150" x2="760" y2="150"/>
    <line x1="40" y1="280" x2="760" y2="280"/>
  </g>
  <!-- ISOMETRIC 3-STOREY BUILDING -->
  <!-- Isometric projection: x_iso = (x-z)*cos30, y_iso = (x+z)*sin30 - y -->
  <!-- Using a simplified isometric box representation -->
  <!-- Ground plane (base) -->
  <polygon points="200,390 480,390 590,320 310,320" fill="#dde6f0" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 1 walls — front face -->
  <polygon points="200,390 310,320 310,240 200,310" fill="#c5d5e8" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 1 walls — right face -->
  <polygon points="310,320 590,320 590,240 310,240" fill="#dde8f5" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 1 floor slab -->
  <polygon points="200,310 310,240 590,240 480,310" fill="#e8f0f8" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 2 walls — front face -->
  <polygon points="200,310 310,240 310,175 200,245" fill="#c5d5e8" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 2 walls — right face -->
  <polygon points="310,240 590,240 590,175 310,175" fill="#dde8f5" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 2 floor slab -->
  <polygon points="200,245 310,175 590,175 480,245" fill="#e8f0f8" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 3 walls — front face -->
  <polygon points="200,245 310,175 310,112 200,182" fill="#c5d5e8" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Level 3 walls — right face -->
  <polygon points="310,175 590,175 590,112 310,112" fill="#dde8f5" stroke="#0A1F44" stroke-width="1.2"/>
  <!-- Roof slab -->
  <polygon points="200,182 310,112 590,112 480,182" fill="#4a7fc1" stroke="#0A1F44" stroke-width="1.5" opacity="0.7"/>
  <!-- Windows — Level 1 front -->
  <rect x="215" y="325" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="250" y="325" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="285" y="325" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Windows — Level 2 front -->
  <rect x="215" y="258" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="250" y="258" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="285" y="258" width="25" height="35" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Windows — Level 3 front -->
  <rect x="215" y="196" width="25" height="30" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="250" y="196" width="25" height="30" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Windows — Level 1 right -->
  <rect x="330" y="325" width="30" height="35" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.7"/>
  <rect x="375" y="325" width="30" height="35" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.7"/>
  <rect x="420" y="325" width="30" height="35" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.7"/>
  <rect x="465" y="325" width="30" height="35" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.7"/>
  <rect x="510" y="325" width="30" height="35" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.7"/>
  <!-- Level labels -->
  <line x1="620" y1="390" x2="620" y2="112" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="617" y1="390" x2="625" y2="390" stroke="#d97706" stroke-width="1"/>
  <line x1="617" y1="320" x2="625" y2="320" stroke="#d97706" stroke-width="1"/>
  <line x1="617" y1="240" x2="625" y2="240" stroke="#d97706" stroke-width="1"/>
  <line x1="617" y1="175" x2="625" y2="175" stroke="#d97706" stroke-width="1"/>
  <line x1="617" y1="112" x2="625" y2="112" stroke="#d97706" stroke-width="1"/>
  <text x="630" y="395" font-family="Arial, sans-serif" font-size="7" fill="#d97706">GL ±0.000</text>
  <text x="630" y="325" font-family="Arial, sans-serif" font-size="7" fill="#d97706">L1 +3.300</text>
  <text x="630" y="245" font-family="Arial, sans-serif" font-size="7" fill="#d97706">L2 +6.600</text>
  <text x="630" y="180" font-family="Arial, sans-serif" font-size="7" fill="#d97706">L3 +9.900</text>
  <text x="630" y="116" font-family="Arial, sans-serif" font-size="7" fill="#d97706">Roof +13.200</text>
  <!-- Column grid marks on roof -->
  <g fill="#d97706" stroke="#d97706" stroke-width="0.8">
    <circle cx="310" cy="112" r="4" fill="none" stroke-width="1.5"/>
    <circle cx="400" cy="112" r="4" fill="none" stroke-width="1.5"/>
    <circle cx="490" cy="112" r="4" fill="none" stroke-width="1.5"/>
    <circle cx="590" cy="112" r="4" fill="none" stroke-width="1.5"/>
  </g>
  <!-- Grid labels on roof -->
  <text x="310" y="105" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">A</text>
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">B</text>
  <text x="490" y="105" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">C</text>
  <text x="590" y="105" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">D</text>
  <!-- BIM info panel -->
  <rect x="40" y="48" width="145" height="120" fill="#f8fafc" stroke="#0A1F44" stroke-width="1"/>
  <rect x="40" y="48" width="145" height="16" fill="#0A1F44"/>
  <text x="113" y="60" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">MODEL INFO</text>
  <text x="50" y="76" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Discipline: Architecture</text>
  <text x="50" y="89" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Storeys: 3</text>
  <text x="50" y="102" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">GFA: 2,850 m²</text>
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Elements: 4,200+</text>
  <text x="50" y="128" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Format: .rvt / .ifc</text>
  <text x="50" y="141" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Coord. System: Shared</text>
  <!-- LOD indicator -->
  <rect x="40" y="185" width="145" height="70" fill="#f8fafc" stroke="#0A1F44" stroke-width="1"/>
  <rect x="40" y="185" width="145" height="14" fill="#0A1F44"/>
  <text x="113" y="196" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">LOD SPECIFICATION</text>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">LOD 100 ○○○○○</text>
  <text x="50" y="223" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">LOD 200 ○○○○○</text>
  <text x="50" y="236" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">LOD 300 ●●●●○</text>
  <text x="50" y="249" font-family="Arial, sans-serif" font-size="6.5" fill="#4a7fc1">LOD 400 ●●●●●  ✓ CURRENT</text>
</svg>

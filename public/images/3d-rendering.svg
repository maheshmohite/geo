<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="20" y="20" width="760" height="460" fill="#ffffff" stroke="#0A1F44" stroke-width="2"/>
  <rect x="28" y="28" width="744" height="452" fill="none" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="28" y="432" width="744" height="48" fill="#0A1F44"/>
  <line x1="368" y1="432" x2="368" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="560" y1="432" x2="560" y2="480" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="44" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">PROJECT</text>
  <text x="44" y="463" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">3D RENDERING &amp; VISUALIZATION</text>
  <text x="44" y="474" font-family="Arial, sans-serif" font-size="7.5" fill="#c8d8ea">Geo-Nectar Technologies Pvt. Ltd.</text>
  <text x="374" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">SOFTWARE</text>
  <text x="374" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">3ds Max + V-Ray</text>
  <text x="566" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">VIEW</text>
  <text x="566" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">EXTERIOR PERSPECTIVE</text>
  <text x="700" y="451" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4" letter-spacing="1.5">DATE</text>
  <text x="700" y="464" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">2024</text>
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8dff0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1F44;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0A1F44;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect x="38" y="42" width="722" height="384" fill="url(#skyGrad)"/>
  <!-- Ground plane -->
  <polygon points="38,330 760,330 760,426 38,426" fill="#d4e8c8" stroke="#9ab3d4" stroke-width="0.5"/>
  <!-- Ground texture lines -->
  <g stroke="#b8d4a8" stroke-width="0.5" opacity="0.6">
    <line x1="38" y1="345" x2="760" y2="345"/>
    <line x1="38" y1="360" x2="760" y2="360"/>
    <line x1="38" y1="375" x2="760" y2="375"/>
    <line x1="38" y1="390" x2="760" y2="390"/>
    <line x1="38" y1="408" x2="760" y2="408"/>
  </g>
  <!-- Main building — multi-storey -->
  <!-- Building shadow -->
  <polygon points="200,330 600,330 670,370 130,370" fill="url(#shadowGrad)" opacity="0.3"/>
  <!-- Ground floor -->
  <rect x="170" y="250" width="420" height="80" fill="#dde8f5" stroke="#0A1F44" stroke-width="1.5"/>
  <!-- Level 1 -->
  <rect x="180" y="180" width="400" height="72" fill="#c8d8ea" stroke="#0A1F44" stroke-width="1.5"/>
  <!-- Level 2 -->
  <rect x="195" y="120" width="370" height="62" fill="#b8c8de" stroke="#0A1F44" stroke-width="1.5"/>
  <!-- Roof -->
  <rect x="185" y="105" width="390" height="17" fill="#0A1F44"/>
  <!-- Window arrays — ground floor -->
  <rect x="190" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="250" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="310" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="390" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="450" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="510" y="260" width="40" height="50" fill="#7fb3d4" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Entry glazing (ground) -->
  <rect x="350" y="255" width="60" height="75" fill="#a8d4ea" stroke="#0A1F44" stroke-width="1.2"/>
  <line x1="380" y1="255" x2="380" y2="330" stroke="#0A1F44" stroke-width="0.6"/>
  <!-- Window arrays — level 1 -->
  <rect x="200" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="255" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="310" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="370" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="430" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="490" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="545" y="192" width="38" height="42" fill="#9ab8d0" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Window arrays — level 2 -->
  <rect x="215" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="265" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="315" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="370" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="420" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="475" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <rect x="530" y="132" width="35" height="36" fill="#8ab0cc" stroke="#0A1F44" stroke-width="0.8" opacity="0.8"/>
  <!-- Trees (left) -->
  <circle cx="90" cy="290" r="45" fill="#4a8c4a" opacity="0.8"/>
  <circle cx="90" cy="290" r="30" fill="#5a9c5a" opacity="0.9"/>
  <rect x="86" y="330" width="8" height="25" fill="#6b4c2a"/>
  <circle cx="130" cy="310" r="30" fill="#4a8c4a" opacity="0.7"/>
  <rect x="126" y="340" width="8" height="18" fill="#6b4c2a"/>
  <!-- Trees (right) -->
  <circle cx="690" cy="295" r="40" fill="#4a8c4a" opacity="0.8"/>
  <circle cx="690" cy="295" r="26" fill="#5a9c5a" opacity="0.9"/>
  <rect x="686" y="330" width="8" height="22" fill="#6b4c2a"/>
  <circle cx="730" cy="310" r="28" fill="#4a8c4a" opacity="0.7"/>
  <rect x="726" y="340" width="7" height="18" fill="#6b4c2a"/>
  <!-- Driveway / path -->
  <polygon points="340,330 420,330 430,426 330,426" fill="#d8d0c0" stroke="#9ab3d4" stroke-width="0.5"/>
  <!-- Parked car (simple) -->
  <rect x="120" y="320" width="55" height="22" fill="#9ab3d4" stroke="#6b7280" stroke-width="1" rx="3"/>
  <rect x="126" y="315" width="43" height="10" fill="#b0c8e0" rx="2"/>
  <!-- Rendering info watermark -->
  <rect x="550" y="45" width="200" height="58" fill="#0A1F44" opacity="0.7" rx="3"/>
  <text x="558" y="60" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4">VIEW: Exterior Perspective NE</text>
  <text x="558" y="73" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4">RESOLUTION: 4K (3840 × 2160)</text>
  <text x="558" y="86" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4">RENDERER: V-Ray 6 / 3ds Max</text>
  <text x="558" y="99" font-family="Arial, sans-serif" font-size="7" fill="#9ab3d4">LIGHTING: HDRI + Sun System</text>
  <!-- Sun position indicator -->
  <circle cx="700" cy="65" r="18" fill="#fbbf24" opacity="0.9"/>
  <g stroke="#fbbf24" stroke-width="1.5" opacity="0.6">
    <line x1="700" y1="42" x2="700" y2="36"/><line x1="700" y1="88" x2="700" y2="94"/>
    <line x1="677" y1="65" x2="671" y2="65"/><line x1="723" y1="65" x2="729" y2="65"/>
    <line x1="684" y1="49" x2="680" y2="45"/><line x1="716" y1="49" x2="720" y2="45"/>
    <line x1="684" y1="81" x2="680" y2="85"/><line x1="716" y1="81" x2="720" y2="85"/>
  </g>
  <text x="700" y="69" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44" text-anchor="middle" font-weight="bold">SUN</text>
  <!-- Scale bar -->
  <rect x="42" y="412" width="100" height="8" fill="#0A1F44"/>
  <rect x="142" y="412" width="100" height="8" fill="white" stroke="#0A1F44" stroke-width="0.5"/>
  <rect x="242" y="412" width="100" height="8" fill="#0A1F44"/>
  <text x="42" y="426" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44">0</text>
  <text x="140" y="426" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">10m</text>
  <text x="340" y="426" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">20m</text>
</svg>

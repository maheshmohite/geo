  <text x="108" y="148" font-family="Arial, sans-serif" font-size="5.5" fill="#c8d8ea" text-anchor="middle">at design stage</text>
  <rect x="184" y="104" width="128" height="48" fill="#1a2f4a" stroke="#4a7fc1" stroke-width="0.8" rx="2"/>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="14" y="14" width="772" height="472" fill="#ffffff" stroke="#0A1F44" stroke-width="1.5"/>
  <rect x="14" y="451" width="772" height="35" fill="#0A1F44"/>
  <line x1="260" y1="451" x2="260" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="520" y1="451" x2="520" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="28" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">CATEGORY</text>
  <text x="28" y="473" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">BIM &amp; DIGITAL TWIN</text>
  <text x="28" y="483" font-family="Arial, sans-serif" font-size="6.5" fill="#c8d8ea">geo-nectar.com</text>
  <text x="274" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">TOPIC</text>
  <text x="274" y="473" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">BIM Coordination Across Multi-Disciplinary Project Teams</text>
  <text x="534" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">PUBLISHED</text>
  <text x="534" y="473" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">January 15, 2023</text>
  <text x="534" y="483" font-family="Arial, sans-serif" font-size="6" fill="#F05A28">GeoNectar Technologies</text>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">BIM COORDINATION INFOGRAPHIC  |  CLASH DETECTION · FEDERATED MODEL · MULTI-DISCIPLINE · NAVISWORKS</text>
  <!-- Header -->
  <rect x="28" y="50" width="744" height="26" fill="#0A1F44" rx="2"/>
  <text x="400" y="67" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#ffffff" text-anchor="middle">BIM COORDINATION FRAMEWORK — GEO-NECTAR MULTI-DISCIPLINE COORDINATION SERVICES</text>
  <!-- Federated model diagram (left panel) -->
  <rect x="28" y="84" width="310" height="356" fill="#f8fafc" stroke="#9ab3d4" stroke-width="0.5"/>
  <text x="183" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">FEDERATED BIM MODEL</text>
  <!-- Discipline layers -->
  <!-- ARCH layer -->
  <rect x="60" y="110" width="240" height="48" fill="#4a7fc1" opacity="0.15" stroke="#4a7fc1" stroke-width="1.5" rx="2"/>
  <rect x="60" y="110" width="6" height="48" fill="#4a7fc1" rx="1"/>
  <text x="76" y="126" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#4a7fc1">ARCHITECTURAL MODEL</text>
  <text x="76" y="138" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280">Floor plans · Facades · Rooms · Finishes · Doors/Windows</text>
  <text x="76" y="149" font-family="Arial, sans-serif" font-size="5.5" fill="#4a7fc1">Revit Architecture  |  LOD 350</text>
  <!-- STRUCT layer -->
  <rect x="60" y="162" width="240" height="48" fill="#22a366" opacity="0.15" stroke="#22a366" stroke-width="1.5" rx="2"/>
  <rect x="60" y="162" width="6" height="48" fill="#22a366" rx="1"/>
  <text x="76" y="178" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#22a366">STRUCTURAL MODEL</text>
  <text x="76" y="190" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280">Columns · Beams · Slabs · Foundations · Steel connections</text>
  <text x="76" y="201" font-family="Arial, sans-serif" font-size="5.5" fill="#22a366">Revit Structure / Tekla  |  LOD 400</text>
  <!-- MEP layer -->
  <rect x="60" y="214" width="240" height="48" fill="#F05A28" opacity="0.15" stroke="#F05A28" stroke-width="1.5" rx="2"/>
  <rect x="60" y="214" width="6" height="48" fill="#F05A28" rx="1"/>
  <text x="76" y="230" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#F05A28">MEP MODEL</text>
  <text x="76" y="242" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280">HVAC ducts · Piping · Cable trays · Fire systems · Plumbing</text>
  <text x="76" y="253" font-family="Arial, sans-serif" font-size="5.5" fill="#F05A28">Revit MEP / AutoCAD MEP  |  LOD 350</text>
  <!-- CIVIL layer -->
  <rect x="60" y="266" width="240" height="48" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1.5" rx="2"/>
  <rect x="60" y="266" width="6" height="48" fill="#7c3aed" rx="1"/>
  <text x="76" y="282" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#7c3aed">CIVIL / SITE MODEL</text>
  <text x="76" y="294" font-family="Arial, sans-serif" font-size="5.5" fill="#6b7280">Roads · Drainage · Utilities · Landscaping · Earthworks</text>
  <text x="76" y="305" font-family="Arial, sans-serif" font-size="5.5" fill="#7c3aed">Civil 3D / Infraworks  |  LOD 300</text>
  <!-- Combined arrow -->
  <line x1="183" y1="317" x2="183" y2="330" stroke="#0A1F44" stroke-width="2"/>
  <polygon points="179,329 183,336 187,329" fill="#0A1F44"/>
  <!-- Federated model box -->
  <rect x="60" y="338" width="240" height="52" fill="#0A1F44" rx="3"/>
  <text x="183" y="354" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#F05A28" text-anchor="middle">FEDERATED MODEL</text>
  <text x="183" y="367" font-family="Arial, sans-serif" font-size="6.5" fill="#ffffff" text-anchor="middle">All disciplines combined in Navisworks</text>
  <text x="183" y="379" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">Clash detection · Coordination · Reporting</text>
  <text x="183" y="390" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle">ISO 19650 compliant</text>

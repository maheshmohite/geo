  <rect x="350" y="84" width="210" height="356" fill="#0a1a2e" stroke="#4a7fc1" stroke-width="0.8"/>
  <text x="455" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff" text-anchor="middle">CLASH DETECTION</text>
  <!-- Clash matrix -->
  <g font-family="Arial, sans-serif" font-size="6">
    <text x="390" y="116" fill="#9ab3d4">vs</text>
    <text x="415" y="116" fill="#4a7fc1" text-anchor="middle">ARCH</text>
    <text x="455" y="116" fill="#22a366" text-anchor="middle">STRUCT</text>
    <text x="495" y="116" fill="#F05A28" text-anchor="middle">MEP</text>
    <text x="365" y="132" fill="#4a7fc1">ARCH</text>
    <rect x="400" y="122" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="415" y="134" fill="#6b7280" text-anchor="middle">—</text>
    <rect x="440" y="122" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="455" y="134" fill="#d97706" text-anchor="middle">12</text>
    <rect x="480" y="122" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="495" y="134" fill="#ef4444" text-anchor="middle">47</text>
    <text x="365" y="152" fill="#22a366">STRUCT</text>
    <rect x="400" y="142" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="415" y="154" fill="#d97706" text-anchor="middle">12</text>
    <rect x="440" y="142" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="455" y="154" fill="#6b7280" text-anchor="middle">—</text>
    <rect x="480" y="142" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="495" y="154" fill="#ef4444" text-anchor="middle">83</text>
    <text x="365" y="172" fill="#F05A28">MEP</text>
    <rect x="400" y="162" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="415" y="174" fill="#ef4444" text-anchor="middle">47</text>
    <rect x="440" y="162" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="455" y="174" fill="#ef4444" text-anchor="middle">83</text>
    <rect x="480" y="162" width="30" height="18" fill="#1a3a5a" rx="1"/>
    <text x="495" y="174" fill="#6b7280" text-anchor="middle">—</text>
  </g>
  <text x="455" y="196" font-family="Arial, sans-serif" font-size="5.5" fill="#9ab3d4" text-anchor="middle">Clash count matrix — before coordination</text>
  <!-- Clash types -->
  <rect x="362" y="202" width="186" height="60" fill="#1a2f5a" rx="2"/>
  <text x="455" y="216" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle" font-weight="bold">CLASH TYPES</text>
  <circle cx="376" cy="230" r="6" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="376" y="234" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#ef4444" text-anchor="middle">H</text>
  <text x="390" y="230" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea">Hard — Physical intersection</text>
  <circle cx="376" cy="248" r="6" fill="none" stroke="#d97706" stroke-width="2"/>
  <text x="376" y="252" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#d97706" text-anchor="middle">S</text>
  <text x="390" y="248" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea">Soft — Clearance violation</text>
  <circle cx="376" cy="256" r="6" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="376" y="260" font-family="Arial, sans-serif" font-size="5.5" font-weight="bold" fill="#fbbf24" text-anchor="middle">W</text>
  <!-- After coordination stats -->
  <rect x="362" y="270" width="186" height="90" fill="#0A1F44" rx="2"/>
  <text x="455" y="285" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle" font-weight="bold">AFTER COORDINATION</text>
  <text x="395" y="306" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22a366" text-anchor="middle">0</text>
  <text x="395" y="320" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">Hard clashes</text>
  <text x="455" y="306" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#d97706" text-anchor="middle">3</text>
  <text x="455" y="320" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">Soft (tracked)</text>
  <text x="515" y="306" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4a7fc1" text-anchor="middle">142</text>
  <text x="515" y="320" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">Resolved total</text>
  <text x="455" y="348" font-family="Arial, sans-serif" font-size="6.5" fill="#F05A28" text-anchor="middle">100% hard clash resolution</text>
  <text x="455" y="360" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">before construction starts</text>
  <!-- Cost savings -->
  <rect x="362" y="368" width="186" height="56" fill="#1a2f5a" rx="2"/>
  <text x="455" y="383" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">COST OF UNRESOLVED CLASHES</text>
  <text x="455" y="400" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">$4,100</text>
  <text x="455" y="412" font-family="Arial, sans-serif" font-size="5.5" fill="#c8d8ea" text-anchor="middle">per RFI raised on-site (avg.)</text>
  <text x="455" y="420" font-family="Arial, sans-serif" font-size="5.5" fill="#F05A28" text-anchor="middle">vs. $0 resolved in BIM coordination</text>
  <!-- Right panel: Workflow -->
  <rect x="572" y="84" width="200" height="356" fill="#f8fafc" stroke="#9ab3d4" stroke-width="0.5"/>
  <text x="672" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">COORDINATION WORKFLOW</text>
  <g font-family="Arial, sans-serif" font-size="6">
    <rect x="584" y="108" width="176" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="594" y="120" fill="#4a7fc1" font-weight="bold">WEEK 1–2</text>
    <text x="594" y="131" fill="#6b7280">Model upload to Common Data</text>
    <text x="594" y="141" fill="#6b7280">Environment (CDE) — BIM 360</text>
    <rect x="584" y="148" width="176" height="36" fill="#e8f8f0" stroke="#22a366" stroke-width="0.5" rx="2"/>
    <text x="594" y="160" fill="#22a366" font-weight="bold">WEEK 2–3</text>
    <text x="594" y="171" fill="#6b7280">Navisworks federated model</text>
    <text x="594" y="181" fill="#6b7280">clash detection run #1</text>
    <rect x="584" y="188" width="176" height="36" fill="#fff8f0" stroke="#F05A28" stroke-width="0.5" rx="2"/>
    <text x="594" y="200" fill="#F05A28" font-weight="bold">WEEK 3–4</text>
    <text x="594" y="211" fill="#6b7280">Issue reports to each discipline</text>
    <text x="594" y="221" fill="#6b7280">Coordination meeting held</text>
    <rect x="584" y="228" width="176" height="36" fill="#fdf8ff" stroke="#7c3aed" stroke-width="0.5" rx="2"/>
    <text x="594" y="240" fill="#7c3aed" font-weight="bold">WEEK 4–5</text>
    <text x="594" y="251" fill="#6b7280">Revised models uploaded</text>
    <text x="594" y="261" fill="#6b7280">Re-run clash detection</text>
    <rect x="584" y="268" width="176" height="36" fill="#f0f8ff" stroke="#3b82f6" stroke-width="0.5" rx="2"/>
    <text x="594" y="280" fill="#3b82f6" font-weight="bold">WEEK 5–6</text>
    <text x="594" y="291" fill="#6b7280">Close-out report issued</text>
    <text x="594" y="301" fill="#6b7280">Coordination complete</text>
  </g>
  <!-- Tools -->
  <rect x="584" y="312" width="176" height="88" fill="#0A1F44" rx="3"/>
  <text x="672" y="327" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle" font-weight="bold">TOOLS &amp; STANDARDS</text>
  <g font-family="Arial, sans-serif" font-size="6.5" fill="#c8d8ea">
    <text x="594" y="342">Navisworks Manage</text>
    <text x="594" y="354">Autodesk BIM 360</text>
    <text x="594" y="366">Revit · AutoCAD MEP</text>
    <text x="594" y="378">Tekla Structures</text>
    <text x="594" y="390">ISO 19650 CDE Protocol</text>
  </g>
  <rect x="584" y="408" width="176" height="26" fill="#F05A28" rx="2"/>
  <text x="672" y="422" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">GeoNectar BIM Coordination</text>
  <text x="672" y="432" font-family="Arial, sans-serif" font-size="5.5" fill="#0A1F44" text-anchor="middle">services@geo-nectar.com</text>

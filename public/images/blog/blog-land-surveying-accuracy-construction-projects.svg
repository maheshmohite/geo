<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="14" y="14" width="772" height="472" fill="#ffffff" stroke="#0A1F44" stroke-width="1.5"/>
  <rect x="14" y="451" width="772" height="35" fill="#0A1F44"/>
  <line x1="260" y1="451" x2="260" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="520" y1="451" x2="520" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="28" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">CATEGORY</text>
  <text x="28" y="473" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">LAND SURVEY INSIGHTS</text>
  <text x="28" y="483" font-family="Arial, sans-serif" font-size="6.5" fill="#c8d8ea">geo-nectar.com</text>
  <text x="274" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">TOPIC</text>
  <text x="274" y="473" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Land Surveying Accuracy: Foundation of Safe Construction</text>
  <text x="534" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">PUBLISHED</text>
  <text x="534" y="473" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">September 15, 2023</text>
  <text x="534" y="483" font-family="Arial, sans-serif" font-size="6" fill="#F05A28">GeoNectar Technologies</text>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">SURVEY ACCURACY INFOGRAPHIC  |  TECHNOLOGY · RISK MANAGEMENT · COMPLIANCE · COST OF ERRORS</text>
  <!-- Header -->
  <rect x="28" y="50" width="744" height="26" fill="#0A1F44" rx="2"/>
  <text x="400" y="67" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#ffffff" text-anchor="middle">LAND SURVEY ACCURACY IN CONSTRUCTION — WHY PRECISION MATTERS AT EVERY PHASE</text>
  <!-- Technology comparison (left) -->
  <rect x="28" y="84" width="240" height="356" fill="#f8fafc" stroke="#9ab3d4" stroke-width="0.5"/>
  <text x="148" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">SURVEY TECHNOLOGY ACCURACY</text>
  <g font-family="Arial, sans-serif" font-size="6">
    <!-- Tech 1: GPS RTK -->
    <rect x="40" y="106" width="216" height="52" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.8" rx="2"/>
    <rect x="40" y="106" width="6" height="52" fill="#4a7fc1" rx="1"/>
    <text x="54" y="120" font-weight="bold" fill="#4a7fc1">GPS RTK / GNSS</text>
    <text x="54" y="131" fill="#6b7280">Horizontal: ±8–15mm</text>
    <text x="54" y="141" fill="#6b7280">Vertical: ±15–20mm</text>
    <text x="54" y="151" fill="#4a7fc1">Best for: Control points, boundary surveys</text>
    <rect x="136" y="108" width="116" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="136" y="108" width="90" height="8" fill="#4a7fc1" rx="1" opacity="0.5"/>
    <text x="254" y="115" fill="#4a7fc1" text-anchor="end">±15mm</text>
    <!-- Tech 2: Total Station -->
    <rect x="40" y="162" width="216" height="52" fill="#e8f8f0" stroke="#22a366" stroke-width="0.8" rx="2"/>
    <rect x="40" y="162" width="6" height="52" fill="#22a366" rx="1"/>
    <text x="54" y="176" font-weight="bold" fill="#22a366">Total Station</text>
    <text x="54" y="187" fill="#6b7280">Horizontal: ±2–5mm</text>
    <text x="54" y="197" fill="#6b7280">Vertical: ±3–7mm</text>
    <text x="54" y="207" fill="#22a366">Best for: Construction stakeout, detail survey</text>
    <rect x="136" y="164" width="116" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="136" y="164" width="28" height="8" fill="#22a366" rx="1" opacity="0.7"/>
    <text x="254" y="171" fill="#22a366" text-anchor="end">±5mm</text>
    <!-- Tech 3: 3D Laser Scan -->
    <rect x="40" y="218" width="216" height="52" fill="#fff8f0" stroke="#F05A28" stroke-width="0.8" rx="2"/>
    <rect x="40" y="218" width="6" height="52" fill="#F05A28" rx="1"/>
    <text x="54" y="232" font-weight="bold" fill="#F05A28">3D Laser Scanning</text>
    <text x="54" y="243" fill="#6b7280">Accuracy: ±1–3mm at 10m</text>
    <text x="54" y="253" fill="#6b7280">Density: 2M pts/sec</text>
    <text x="54" y="263" fill="#F05A28">Best for: As-built, heritage, Scan-to-BIM</text>
    <rect x="136" y="220" width="116" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="136" y="220" width="15" height="8" fill="#F05A28" rx="1" opacity="0.7"/>
    <text x="254" y="227" fill="#F05A28" text-anchor="end">±2mm</text>
    <!-- Tech 4: Drone/UAV -->
    <rect x="40" y="274" width="216" height="52" fill="#fdf8ff" stroke="#7c3aed" stroke-width="0.8" rx="2"/>
    <rect x="40" y="274" width="6" height="52" fill="#7c3aed" rx="1"/>
    <text x="54" y="288" font-weight="bold" fill="#7c3aed">Drone / UAV</text>
    <text x="54" y="299" fill="#6b7280">GSD: 2cm/px at 100m altitude</text>
    <text x="54" y="309" fill="#6b7280">RMSE: ±3–5cm with GCPs</text>
    <text x="54" y="319" fill="#7c3aed">Best for: Large sites, topographic surveys</text>
    <rect x="136" y="276" width="116" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="136" y="276" width="50" height="8" fill="#7c3aed" rx="1" opacity="0.6"/>
    <text x="254" y="283" fill="#7c3aed" text-anchor="end">±30mm</text>
    <!-- Tech 5: Photogrammetry -->
    <rect x="40" y="330" width="216" height="52" fill="#f8f8e8" stroke="#d97706" stroke-width="0.8" rx="2"/>
    <rect x="40" y="330" width="6" height="52" fill="#d97706" rx="1"/>
    <text x="54" y="344" font-weight="bold" fill="#d97706">Photogrammetry</text>
    <text x="54" y="355" fill="#6b7280">Point density: High</text>
    <text x="54" y="365" fill="#6b7280">RMSE: ±5–10mm</text>
    <text x="54" y="375" fill="#d97706">Best for: Surface mapping, volume calcs</text>
    <rect x="136" y="332" width="116" height="8" fill="#e0e8f0" rx="1"/>
    <rect x="136" y="332" width="72" height="8" fill="#d97706" rx="1" opacity="0.6"/>
    <text x="254" y="339" fill="#d97706" text-anchor="end">±10mm</text>
    <text x="230" y="395" font-size="5.5" fill="#6b7280" text-anchor="end">← More precise    Less precise →</text>
  </g>
  <!-- Centre: Cost of survey errors -->
  <rect x="280" y="84" width="240" height="356" fill="#0A1F44" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff" text-anchor="middle">COST OF SURVEY ERRORS</text>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">Error cost compounds as project advances</text>
  <!-- Escalating cost chart -->
  <g font-family="Arial, sans-serif" font-size="6">
    <!-- Phase bars -->
    <text x="295" y="130" fill="#9ab3d4">SURVEY STAGE</text>
    <rect x="295" y="134" width="14" height="18" fill="#22a366" rx="1"/>
    <text x="313" y="146" fill="#c8d8ea">Survey Phase</text>
    <text x="440" y="142" fill="#22a366" text-anchor="end">$500</text>
    <text x="295" y="165" fill="#9ab3d4">DESIGN STAGE</text>
    <rect x="295" y="169" width="42" height="18" fill="#fbbf24" rx="1"/>
    <text x="341" y="181" fill="#c8d8ea">Design Phase</text>
    <text x="440" y="177" fill="#fbbf24" text-anchor="end">$5,000</text>
    <text x="295" y="200" fill="#9ab3d4">PLANNING / APPROVAL</text>
    <rect x="295" y="204" width="70" height="18" fill="#d97706" rx="1"/>
    <text x="369" y="216" fill="#c8d8ea">Approval</text>
    <text x="440" y="212" fill="#d97706" text-anchor="end">$15,000</text>
    <text x="295" y="235" fill="#9ab3d4">CONSTRUCTION START</text>
    <rect x="295" y="239" width="110" height="18" fill="#F05A28" rx="1"/>
    <text x="409" y="251" fill="#c8d8ea">Construction</text>
    <text x="440" y="247" fill="#F05A28" text-anchor="end">$50,000</text>
    <text x="295" y="270" fill="#9ab3d4">MID-CONSTRUCTION</text>
    <rect x="295" y="274" width="145" height="18" fill="#ef4444" rx="1"/>
    <text x="443" y="286" fill="#c8d8ea">Mid-build</text>
    <text x="510" y="282" fill="#ef4444" text-anchor="end">$200,000+</text>
  </g>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle">Rule of Ten: Each project phase multiplies</text>
  <text x="400" y="322" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle">the cost of correcting a survey error by 10×</text>
  <!-- Compliance checklist -->
  <rect x="292" y="334" width="216" height="92" fill="#1a2f5a" rx="2"/>
  <text x="400" y="349" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle" font-weight="bold">COMPLIANCE REQUIREMENTS</text>
  <g font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea">
    <text x="300" y="364">✓  Zoning &amp; setback verification</text>
    <text x="300" y="376">✓  Environmental regulation mapping</text>
    <text x="300" y="388">✓  Utility easement documentation</text>
    <text x="300" y="400">✓  Flood zone determination (FEMA)</text>
    <text x="300" y="412">✓  Title &amp; boundary compliance (ALTA)</text>
    <text x="300" y="424">✓  ADA &amp; grade accessibility checks</text>
  </g>
  <!-- Right panel: Accuracy standards + GeoNectar -->
  <rect x="532" y="84" width="240" height="356" fill="#f8fafc" stroke="#9ab3d4" stroke-width="0.5"/>
  <text x="652" y="100" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">ACCURACY STANDARDS</text>
  <g font-family="Arial, sans-serif" font-size="6">
    <rect x="544" y="106" width="216" height="36" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="554" y="119" font-weight="bold" fill="#4a7fc1">ALTA/NSPS 2021 Standards</text>
    <text x="554" y="130" fill="#6b7280">Relative positional accuracy: ≤2cm + 50ppm</text>
    <text x="554" y="140" fill="#6b7280">Required for commercial title insurance</text>
    <rect x="544" y="146" width="216" height="36" fill="#e8f8f0" stroke="#22a366" stroke-width="0.5" rx="2"/>
    <text x="554" y="159" font-weight="bold" fill="#22a366">FGDC Geospatial Standards</text>
    <text x="554" y="170" fill="#6b7280">National Map Accuracy Standards (NMAS)</text>
    <text x="554" y="180" fill="#6b7280">Horizontal: ≤0.5mm at map scale</text>
    <rect x="544" y="186" width="216" height="36" fill="#fff8f0" stroke="#F05A28" stroke-width="0.5" rx="2"/>
    <text x="554" y="199" font-weight="bold" fill="#F05A28">ASPRS Accuracy Standards</text>
    <text x="554" y="210" fill="#6b7280">Vertical Accuracy Class 1: RMSE ≤5cm</text>
    <text x="554" y="220" fill="#6b7280">Horizontal Class 1: RMSE ≤7.5cm</text>
    <rect x="544" y="226" width="216" height="36" fill="#fdf8ff" stroke="#7c3aed" stroke-width="0.5" rx="2"/>
    <text x="554" y="239" font-weight="bold" fill="#7c3aed">IHO S-44 Hydrographic</text>
    <text x="554" y="250" fill="#6b7280">Special Order: ±250mm + 0.0075×depth</text>
    <text x="554" y="260" fill="#6b7280">For dredging &amp; port survey</text>
  </g>
  <!-- Surveyor-Engineer collaboration -->
  <rect x="544" y="270" width="216" height="96" fill="#f0f4f8" stroke="#9ab3d4" stroke-width="0.5" rx="2"/>
  <text x="652" y="285" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#0A1F44" text-anchor="middle">SURVEYOR–ENGINEER SYNERGY</text>
  <g font-family="Arial, sans-serif" font-size="6" fill="#0A1F44">
    <text x="554" y="300">Surveyor provides:</text>
    <text x="554" y="312">• Boundary data · Topography · As-built</text>
    <text x="554" y="324">Engineer uses for:</text>
    <text x="554" y="336">• Grade design · Drainage · Foundation</text>
    <text x="554" y="348">GeoNectar bridges both disciplines —</text>
    <text x="554" y="358">survey drafting + BIM modelling combined</text>
  </g>
  <!-- GeoNectar stamp -->
  <rect x="544" y="374" width="216" height="56" fill="#0A1F44" rx="3"/>
  <text x="652" y="390" font-family="Arial, sans-serif" font-size="6.5" fill="#9ab3d4" text-anchor="middle" font-weight="bold">GEO-NECTAR SURVEY DRAFTING</text>
  <text x="576" y="406" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F05A28" text-anchor="middle">ISO</text>
  <text x="576" y="418" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">Certified</text>
  <text x="652" y="406" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#22a366" text-anchor="middle">±2mm</text>
  <text x="652" y="418" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">Accuracy</text>
  <text x="726" y="406" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4a7fc1" text-anchor="middle">USA</text>
  <text x="726" y="418" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">UK · AUS</text>
  <text x="652" y="432" font-family="Arial, sans-serif" font-size="6.5" fill="#F05A28" text-anchor="middle">services@geo-nectar.com</text>
</svg>

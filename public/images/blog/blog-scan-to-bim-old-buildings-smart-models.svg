<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f4f8"/>
  <rect x="14" y="14" width="772" height="472" fill="#ffffff" stroke="#0A1F44" stroke-width="1.5"/>
  <rect x="14" y="451" width="772" height="35" fill="#0A1F44"/>
  <line x1="260" y1="451" x2="260" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <line x1="520" y1="451" x2="520" y2="486" stroke="#4a7fc1" stroke-width="0.5"/>
  <text x="28" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">CATEGORY</text>
  <text x="28" y="473" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">BIM &amp; DIGITAL TWIN</text>
  <text x="28" y="483" font-family="Arial, sans-serif" font-size="6.5" fill="#c8d8ea">geo-nectar.com</text>
  <text x="274" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">TOPIC</text>
  <text x="274" y="473" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Scan to BIM: Turning Old Buildings into Smart Models</text>
  <text x="534" y="462" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" letter-spacing="1.2">PUBLISHED</text>
  <text x="534" y="473" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">September 15, 2022</text>
  <text x="534" y="483" font-family="Arial, sans-serif" font-size="6" fill="#F05A28">GeoNectar Technologies</text>
  <g stroke="#c8d8ea" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.5">
    <line x1="400" y1="28" x2="400" y2="444"/>
    <line x1="28" y1="260" x2="772" y2="260"/>
  </g>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280">SCAN TO BIM INFOGRAPHIC  |  POINT CLOUD · AS-BUILT · DIGITAL TWIN · HERITAGE · RENOVATION</text>
  <!-- Header -->
  <rect x="28" y="50" width="744" height="26" fill="#0A1F44" rx="2"/>
  <text x="400" y="67" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#ffffff" text-anchor="middle">SCAN TO BIM WORKFLOW — GEO-NECTAR POINT CLOUD TO INTELLIGENT MODEL SERVICES</text>
  <!-- PANEL 1: Workflow (top, full width) -->
  <rect x="28" y="84" width="744" height="96" fill="#f8fafc" stroke="#9ab3d4" stroke-width="0.5"/>
  <text x="400" y="99" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">CONVERSION WORKFLOW — EXISTING BUILDING TO BIM MODEL</text>
  <!-- Step 1 -->
  <rect x="40" y="106" width="106" height="60" fill="#4a7fc1" rx="3"/>
  <text x="93" y="122" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#ffffff" text-anchor="middle">STEP 1</text>
  <text x="93" y="134" font-family="Arial, sans-serif" font-size="6" fill="#c8d8ea" text-anchor="middle">3D Laser Scan</text>
  <text x="93" y="144" font-family="Arial, sans-serif" font-size="5.5" fill="#c8d8ea" text-anchor="middle">Leica RTC360</text>
  <text x="93" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#c8d8ea" text-anchor="middle">±2mm accuracy</text>
  <text x="93" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#fbbf24" text-anchor="middle">360° coverage</text>
  <!-- Arrow -->
  <polygon points="148,136 155,136 151,130 163,136 151,142 155,136 148,136" fill="#F05A28"/>
  <!-- Step 2 -->
  <rect x="165" y="106" width="106" height="60" fill="#F05A28" rx="3"/>
  <text x="218" y="122" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#ffffff" text-anchor="middle">STEP 2</text>
  <text x="218" y="134" font-family="Arial, sans-serif" font-size="6" fill="#fcd9c8" text-anchor="middle">Point Cloud</text>
  <text x="218" y="144" font-family="Arial, sans-serif" font-size="6" fill="#fcd9c8" text-anchor="middle">Processing</text>
  <text x="218" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#fcd9c8" text-anchor="middle">Registration &amp;</text>
  <text x="218" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#fcd9c8" text-anchor="middle">noise filtering</text>
  <polygon points="273,136 280,136 276,130 288,136 276,142 280,136 273,136" fill="#F05A28"/>
  <!-- Step 3 -->
  <rect x="290" y="106" width="106" height="60" fill="#22a366" rx="3"/>
  <text x="343" y="122" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#ffffff" text-anchor="middle">STEP 3</text>
  <text x="343" y="134" font-family="Arial, sans-serif" font-size="6" fill="#c8f0dc" text-anchor="middle">BIM Modelling</text>
  <text x="343" y="144" font-family="Arial, sans-serif" font-size="6" fill="#c8f0dc" text-anchor="middle">in Revit</text>
  <text x="343" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#c8f0dc" text-anchor="middle">LOD 200–400</text>
  <text x="343" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#c8f0dc" text-anchor="middle">As-built accuracy</text>
  <polygon points="398,136 405,136 401,130 413,136 401,142 405,136 398,136" fill="#F05A28"/>
  <!-- Step 4 -->
  <rect x="415" y="106" width="106" height="60" fill="#7c3aed" rx="3"/>
  <text x="468" y="122" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#ffffff" text-anchor="middle">STEP 4</text>
  <text x="468" y="134" font-family="Arial, sans-serif" font-size="6" fill="#e0c8f8" text-anchor="middle">QA vs Cloud</text>
  <text x="468" y="144" font-family="Arial, sans-serif" font-size="6" fill="#e0c8f8" text-anchor="middle">Deviation check</text>
  <text x="468" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#e0c8f8" text-anchor="middle">Heat map review</text>
  <text x="468" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#e0c8f8" text-anchor="middle">±5mm tolerance</text>
  <polygon points="523,136 530,136 526,130 538,136 526,142 530,136 523,136" fill="#F05A28"/>

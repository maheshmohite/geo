    <text x="580" y="222" fill="#6b7280">Detail Level</text>
    <text x="710" y="222" fill="#6b7280" text-anchor="end">Scan Accuracy</text>
    <line x1="544" y1="225" x2="762" y2="225" stroke="#e0e8f0" stroke-width="0.5"/>
    <rect x="544" y="229" width="210" height="14" fill="#e8f0f8" rx="1"/>
    <text x="550" y="239" font-weight="bold" fill="#4a7fc1">LOD 200</text>
    <text x="588" y="239" fill="#6b7280">Generic forms, volumes</text>
    <text x="752" y="239" fill="#9ab3d4" text-anchor="end">±50mm</text>
    <rect x="544" y="246" width="210" height="14" fill="#e8f0f8" rx="1"/>
    <text x="550" y="256" font-weight="bold" fill="#4a7fc1">LOD 300</text>
    <text x="588" y="256" fill="#6b7280">Precise geometry, openings</text>
    <text x="752" y="256" fill="#9ab3d4" text-anchor="end">±10mm</text>
    <rect x="544" y="263" width="210" height="14" fill="#e8f8f0" rx="1"/>
    <text x="550" y="273" font-weight="bold" fill="#22a366">LOD 350</text>
    <text x="588" y="273" fill="#6b7280">Interfaces, connections</text>
    <text x="752" y="273" fill="#22a366" text-anchor="end">±5mm</text>
    <rect x="544" y="280" width="210" height="14" fill="#e8f8f0" rx="1"/>
    <text x="550" y="290" font-weight="bold" fill="#22a366">LOD 400</text>
    <text x="588" y="290" fill="#6b7280">Fabrication &amp; shop drawings</text>
    <text x="752" y="290" fill="#22a366" text-anchor="end">±2mm</text>
    <rect x="544" y="297" width="210" height="14" fill="#e8f8f0" rx="1"/>
    <text x="550" y="307" font-weight="bold" fill="#F05A28">LOD 500</text>
    <text x="588" y="307" fill="#6b7280">As-built, verified in field</text>
    <text x="752" y="307" fill="#F05A28" text-anchor="end">±2mm</text>
    <!-- Deliverable list -->

    <rect x="290" y="214" width="216" height="44" fill="#e8f0f8" stroke="#4a7fc1" stroke-width="0.5" rx="2"/>
    <text x="300" y="228" font-size="7" font-weight="bold" fill="#4a7fc1">Heritage Preservation</text>
    <text x="300" y="240" font-size="5.5" fill="#6b7280">Document historic structures before restoration.</text>
    <text x="300" y="250" font-size="5.5" fill="#6b7280">Preserve intricate architectural details digitally.</text>
    <rect x="290" y="262" width="216" height="44" fill="#e8f8f0" stroke="#22a366" stroke-width="0.5" rx="2"/>
    <text x="300" y="276" font-size="7" font-weight="bold" fill="#22a366">Renovation &amp; Refurbishment</text>
    <text x="300" y="288" font-size="5.5" fill="#6b7280">As-built model eliminates guesswork during design.</text>
    <text x="300" y="298" font-size="5.5" fill="#6b7280">Clash detection before a wall is touched.</text>
    <rect x="290" y="310" width="216" height="44" fill="#fff8f0" stroke="#F05A28" stroke-width="0.5" rx="2"/>
    <text x="300" y="324" font-size="7" font-weight="bold" fill="#F05A28">Facility Management</text>
    <text x="300" y="336" font-size="5.5" fill="#6b7280">Live BIM model for maintenance teams.</text>
    <text x="300" y="346" font-size="5.5" fill="#6b7280">Asset tracking, space utilisation, MEP as-built.</text>
    <rect x="290" y="358" width="216" height="44" fill="#fdf8ff" stroke="#7c3aed" stroke-width="0.5" rx="2"/>
    <text x="300" y="372" font-size="7" font-weight="bold" fill="#7c3aed">Smart City / Digital Twin</text>
    <text x="300" y="384" font-size="5.5" fill="#6b7280">BIM + IoT = live city intelligence platform.</text>
    <text x="300" y="394" font-size="5.5" fill="#6b7280">Bridges physical &amp; digital infrastructure.</text>
  </g>
  <rect x="290" y="408" width="216" height="32" fill="#0A1F44" rx="2"/>

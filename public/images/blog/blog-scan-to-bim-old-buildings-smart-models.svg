  <text x="144" y="413" font-family="Arial, sans-serif" font-size="6" fill="#9ab3d4" text-anchor="middle">ACCURACY: ±2mm  |  360° COVERAGE</text>
  <text x="144" y="425" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle">LEICA RTC360 · FARO FOCUS · MATTERPORT</text>

  <text x="593" y="134" font-family="Arial, sans-serif" font-size="6" fill="#fef3c7" text-anchor="middle">Deliverable</text>
  <text x="593" y="144" font-family="Arial, sans-serif" font-size="6" fill="#fef3c7" text-anchor="middle">Package</text>
  <text x="593" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#fef3c7" text-anchor="middle">.RVT / .IFC / .NWD</text>
  <text x="593" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#fef3c7" text-anchor="middle">DWG / PDF sets</text>
  <polygon points="648,136 655,136 651,130 663,136 651,142 655,136 648,136" fill="#F05A28"/>
  <!-- Step 6 -->
  <rect x="665" y="106" width="96" height="60" fill="#0A1F44" rx="3"/>
  <text x="713" y="122" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#F05A28" text-anchor="middle">DIGITAL</text>
  <text x="713" y="132" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#F05A28" text-anchor="middle">TWIN</text>
  <text x="713" y="144" font-family="Arial, sans-serif" font-size="5.5" fill="#9ab3d4" text-anchor="middle">Live model sync</text>
  <text x="713" y="154" font-family="Arial, sans-serif" font-size="5.5" fill="#9ab3d4" text-anchor="middle">IoT connected</text>
  <text x="713" y="164" font-family="Arial, sans-serif" font-size="5.5" fill="#9ab3d4" text-anchor="middle">FM ready</text>
  <!-- Bottom 3 panels -->

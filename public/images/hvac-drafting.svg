  <rect x="52" y="330" width="600" height="30" fill="#e0f0e8" stroke="#22a366" stroke-width="1.5"/>
  <text x="352" y="349" font-family="Arial, sans-serif" font-size="7.5" fill="#0A1F44" text-anchor="middle" font-weight="bold">600 × 300 RA — RETURN AIR DUCT</text>
  <!-- Return air grilles (top of RA duct) -->
  <rect x="180" y="320" width="32" height="12" fill="#e0f0e8" stroke="#22a366" stroke-width="1.2"/>
  <text x="196" y="316" font-family="Arial, sans-serif" font-size="5.5" fill="#22a366" text-anchor="middle">RA-01</text>
  <rect x="360" y="320" width="32" height="12" fill="#e0f0e8" stroke="#22a366" stroke-width="1.2"/>
  <text x="376" y="316" font-family="Arial, sans-serif" font-size="5.5" fill="#22a366" text-anchor="middle">RA-02</text>
  <rect x="540" y="320" width="32" height="12" fill="#e0f0e8" stroke="#22a366" stroke-width="1.2"/>
  <text x="556" y="316" font-family="Arial, sans-serif" font-size="5.5" fill="#22a366" text-anchor="middle">RA-03</text>
  <!-- Return air connection to AHU -->
  <rect x="52" y="145" width="36" height="185" fill="#e0f0e8" stroke="#22a366" stroke-width="1.5"/>
  <text x="70" y="240" font-family="Arial, sans-serif" font-size="6" fill="#22a366" text-anchor="middle" transform="rotate(-90,70,240)">600×300 RA</text>

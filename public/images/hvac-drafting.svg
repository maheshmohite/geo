  <g stroke="#4a7fc1" stroke-width="0.5">
    <line x1="242" y1="260" x2="242" y2="280"/><line x1="248" y1="260" x2="248" y2="280"/>
    <line x1="254" y1="260" x2="254" y2="280"/><line x1="260" y1="260" x2="260" y2="280"/>
    <line x1="266" y1="260" x2="266" y2="280"/><line x1="272" y1="260" x2="272" y2="280"/>
  </g>
  <text x="256" y="292" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle">SA-01 600L/s</text>
  <!-- Grille at 456 -->
  <rect x="438" y="260" width="36" height="20" fill="#dde8f5" stroke="#4a7fc1" stroke-width="1.5"/>
  <g stroke="#4a7fc1" stroke-width="0.5">
    <line x1="442" y1="260" x2="442" y2="280"/><line x1="448" y1="260" x2="448" y2="280"/>
    <line x1="454" y1="260" x2="454" y2="280"/><line x1="460" y1="260" x2="460" y2="280"/>
    <line x1="466" y1="260" x2="466" y2="280"/><line x1="472" y1="260" x2="472" y2="280"/>
  </g>
  <text x="456" y="292" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle">SA-02 600L/s</text>
  <!-- Grille at 646 -->
  <rect x="630" y="260" width="32" height="20" fill="#dde8f5" stroke="#4a7fc1" stroke-width="1.5"/>
  <g stroke="#4a7fc1" stroke-width="0.5">
    <line x1="634" y1="260" x2="634" y2="280"/><line x1="640" y1="260" x2="640" y2="280"/>
    <line x1="646" y1="260" x2="646" y2="280"/><line x1="652" y1="260" x2="652" y2="280"/>
    <line x1="658" y1="260" x2="658" y2="280"/>
  </g>
  <text x="646" y="292" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle">SA-03 450L/s</text>

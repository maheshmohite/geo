  <rect x="52" y="370" width="700" height="50" fill="#f8fafc" stroke="#0A1F44" stroke-width="1"/>
  <rect x="52" y="370" width="700" height="14" fill="#0A1F44"/>
  <text x="402" y="381" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">HVAC LEGEND</text>
  <rect x="62" y="389" width="25" height="14" fill="#c8e0f8" stroke="#4a7fc1" stroke-width="1.5"/>
  <text x="93" y="400" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Supply Air (SA)</text>
  <rect x="175" y="389" width="25" height="14" fill="#e0f0e8" stroke="#22a366" stroke-width="1.5"/>
  <text x="206" y="400" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Return Air (RA)</text>
  <rect x="290" y="392" width="20" height="8" fill="#dde8f5" stroke="#4a7fc1" stroke-width="1"/>
  <g stroke="#4a7fc1" stroke-width="0.4"><line x1="293" y1="392" x2="293" y2="400"/><line x1="297" y1="392" x2="297" y2="400"/><line x1="301" y1="392" x2="301" y2="400"/><line x1="305" y1="392" x2="305" y2="400"/></g>
  <text x="316" y="400" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Diffuser/Grille</text>
  <rect x="410" y="389" width="50" height="14" fill="#c8dff0" stroke="#4a7fc1" stroke-width="2" rx="2"/>
  <text x="416" y="400" font-family="Arial, sans-serif" font-size="6.5" fill="#0A1F44">Air Handling Unit</text>
  <line x1="520" y1="396" x2="545" y2="396" stroke="#d97706" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="550" y="400" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Grid / Column Line</text>
  <circle cx="680" cy="396" r="6" fill="#0A1F44"/>
  <text x="692" y="400" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44">Grid Ref.</text>

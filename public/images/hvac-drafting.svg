  <text x="646" y="195" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle" transform="rotate(-90,646,195)">300 × 200 SA</text>
  <polygon points="632,120 660,120 655,130 637,130" fill="#9ab8d0" stroke="#4a7fc1" stroke-width="0.8"/>

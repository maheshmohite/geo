  <g stroke="#c8d8ea" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.5">
    <line x1="200" y1="40" x2="200" y2="424"/>
    <line x1="400" y1="40" x2="400" y2="424"/>
    <line x1="600" y1="40" x2="600" y2="424"/>
    <line x1="40" y1="200" x2="760" y2="200"/>
    <line x1="40" y1="320" x2="760" y2="320"/>
  </g>

  <text x="456" y="195" font-family="Arial, sans-serif" font-size="6" fill="#4a7fc1" text-anchor="middle" transform="rotate(-90,456,195)">400 × 200 SA</text>
  <polygon points="442,120 470,120 465,130 447,130" fill="#9ab8d0" stroke="#4a7fc1" stroke-width="0.8"/>
  <!-- Branch at 640 -->

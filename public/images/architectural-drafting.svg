  <text x="145" y="148" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">9.2 × 7.5m</text>
  <text x="520" y="120" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">DINING</text>
  <text x="520" y="135" font-family="Arial, sans-serif" font-size="7" fill="#4a7fc1" text-anchor="middle">ROOM</text>
  <text x="520" y="148" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">5.5 × 7.5m</text>

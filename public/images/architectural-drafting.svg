  <text x="147" y="45" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">9,250</text>
  <line x1="240" y1="47" x2="420" y2="47" stroke="#0A1F44" stroke-width="0.5"/>
  <text x="330" y="45" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">9,000</text>
  <line x1="420" y1="47" x2="635" y2="47" stroke="#0A1F44" stroke-width="0.5"/>
  <text x="527" y="45" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">10,750</text>

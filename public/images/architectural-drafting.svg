  <rect x="270" y="53" width="50" height="6" fill="#a8c5e0" stroke="#0A1F44" stroke-width="0.8"/>
  <rect x="450" y="53" width="80" height="6" fill="#a8c5e0" stroke="#0A1F44" stroke-width="0.8"/>

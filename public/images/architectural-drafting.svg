  <text x="710" y="138" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">DRAWING NO.</text>
  <text x="710" y="151" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#0A1F44" text-anchor="middle">A-100</text>
  <text x="710" y="163" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44" text-anchor="middle">REVISION</text>
  <text x="710" y="175" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#0A1F44" text-anchor="middle">Rev D</text>
  <text x="710" y="187" font-family="Arial, sans-serif" font-size="5.5" fill="#4a7fc1" text-anchor="middle">FOR CONSTRUCTION</text>

  <line x1="643" y1="55" x2="655" y2="55" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="643" y1="415" x2="655" y2="415" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="665" y="238" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle" transform="rotate(90,665,238)" font-weight="bold">18,000</text>

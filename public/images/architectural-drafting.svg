  <text x="145" y="275" font-family="Arial, sans-serif" font-size="7" fill="#4a7fc1" text-anchor="middle">01</text>
  <text x="145" y="290" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">9.2 × 5.5m</text>
  <text x="327" y="362" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#0A1F44" text-anchor="middle">BATHROOM</text>
  <text x="327" y="378" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">6.0 × 3.2m</text>
  <text x="520" y="305" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#0A1F44" text-anchor="middle">BEDROOM</text>
  <text x="520" y="320" font-family="Arial, sans-serif" font-size="7" fill="#4a7fc1" text-anchor="middle">02</text>
  <text x="520" y="335" font-family="Arial, sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">5.5 × 6.2m</text>
  <!-- Dimension lines — top -->
  <line x1="55" y1="44" x2="635" y2="44" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="55" y1="39" x2="55" y2="50" stroke="#0A1F44" stroke-width="0.8"/>
  <line x1="635" y1="39" x2="635" y2="50" stroke="#0A1F44" stroke-width="0.8"/>
  <text x="345" y="42" font-family="Arial, sans-serif" font-size="7" fill="#0A1F44" text-anchor="middle" font-weight="bold">29,000</text>
  <!-- Dimension lines — right -->

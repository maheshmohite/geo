  <text x="294" y="239" font-family="Arial, sans-serif" font-size="6" fill="#0A1F44">115</text>
  <text x="344" y="239" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0A1F44">120</text>
